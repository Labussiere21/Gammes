<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="img/logoonglet.png">
<link rel="apple-touch-icon" href="img/logoonglet.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accords de basse : power, triade, 7e | ScalaBass</title>
<meta name="description" content="Accords de basse électrique 4 cordes : diagrammes de positions pour dyades, triades, accords de 7e. Lecture audio, degrés, doigtés.">
<link rel="canonical" href="https://labussiere21.github.io/Gammes/accords-basse.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<style>
:root{
  --bg:#15100c;--bg-2:#1d160f;--panel:#241a12;--panel-2:#2c2016;
  --line:#3a2c1e;--brass:#d9a849;--brass-dim:#9c7a3a;
  --bone:#efe6d3;--cream:#ece1cd;--muted:#9d8a72;--muted-2:#6f5f4c;
  --radius:14px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  background:
    radial-gradient(1100px 550px at 80% -10%,rgba(217,168,73,.09),transparent 58%),
    radial-gradient(800px 480px at -8% 105%,rgba(217,168,73,.06),transparent 52%),
    var(--bg);
  color:var(--cream);font-family:"Hanken Grotesk",system-ui,sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:clamp(20px,4vw,52px) clamp(16px,4vw,40px) 80px}
header{margin-bottom:34px}
.logo-bar{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:8px}
.logo-bar .inst-bar{margin-bottom:0}
.inst-bar{display:flex;gap:3px;background:#0e0a07;border:1px solid var(--line);border-radius:8px;padding:3px;width:fit-content}
.inst-btn{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:5px 14px;border-radius:5px;transition:.12s;white-space:nowrap}
.inst-btn:hover{color:var(--cream)}
.inst-btn.bass-btn.active{background:var(--brass);color:#160f08;font-weight:700}
.inst-btn.guit-btn.active{background:#bf1828;color:#fff;font-weight:700}
.eyebrow{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);display:flex;align-items:center;gap:12px;height:44px;flex-wrap:nowrap}
.site-name{font-weight:700;letter-spacing:.18em;color:var(--brass);font-size:22px;white-space:nowrap;flex-shrink:0}
.site-nav{display:flex;gap:2px;background:#0e0a07;border:1px solid var(--line);border-radius:8px;padding:3px;flex-shrink:0}
.nav-link{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:5px;transition:color .12s,background .12s;white-space:nowrap;font-weight:700;display:inline-block}
.nav-link:hover{color:var(--cream)}
.nav-link.active{background:var(--brass);color:#160f08}
.header-tools{display:flex;gap:10px;align-items:center;flex-wrap:nowrap;flex-shrink:0}
.htool-seg{display:inline-flex;background:#0e0a07;border:1px solid var(--line);border-radius:7px;padding:2px;gap:1px;flex-shrink:0}
.htool-seg button{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:0;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:5px;transition:color .1s,background .1s;white-space:nowrap;font-weight:700}
.htool-seg button:hover{color:var(--cream)}
.htool-seg button.on{background:var(--brass);color:#160f08}
.htool-divider{width:1px;height:16px;background:var(--line);margin:0 2px;flex-shrink:0;align-self:center}
h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:clamp(42px,7.5vw,82px);line-height:.95;margin:.12em 0 .1em}
h1 em{font-style:italic;color:var(--brass)}
.lede{color:var(--muted);max-width:64ch;font-size:clamp(14px,1.4vw,16px)}

/* Controls */
.controls{margin-top:28px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:20px clamp(14px,2.4vw,24px);box-shadow:0 24px 60px -40px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.03)}
.ctl-label{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2);margin-bottom:9px}
.ctl-row{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}

/* Piano */
.piano-wrap{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
.piano{position:relative;display:flex;align-items:flex-end;height:170px;user-select:none;background:#0c0906;padding:8px 8px 0;border-radius:10px;border:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.04)}
.wkey{position:relative;width:56px;height:136px;background:linear-gradient(180deg,#f8f2e8,#e8dfc8 70%,#d4c9ad);border:1px solid #2a1e12;border-radius:0 0 7px 7px;margin:0 1.5px;cursor:pointer;color:#3a2c1e;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:10px;gap:3px;font-weight:700;font-size:13px;transition:background .1s,transform .05s;box-shadow:inset 0 -3px 6px rgba(0,0,0,.15),2px 0 0 rgba(0,0,0,.1)}
.wkey:hover{background:linear-gradient(180deg,#fff9ee,#ede1c4)}
.wkey:active{transform:translateY(2px)}
.wkey.sel{background:linear-gradient(180deg,var(--brass),#c9952d 70%,#a07820);color:#160f08;box-shadow:inset 0 -2px 5px rgba(0,0,0,.3),0 0 12px rgba(217,168,73,.4)}
.wkey .wlabel{font-size:12px;font-weight:700;line-height:1}
.bkey{position:absolute;top:8px;width:38px;height:100px;z-index:3;background:linear-gradient(180deg,#1e1508,#0a0704 60%,#1a1208);border:1px solid #000;border-top:none;border-radius:0 0 6px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8px;gap:2px;line-height:1;box-shadow:2px 4px 8px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.07);transition:background .1s,transform .05s}
.bkey:hover{background:linear-gradient(180deg,#2e2010,#100b06)}
.bkey:active{transform:translateY(2px)}
.bkey.sel{background:linear-gradient(180deg,var(--brass),#9c7520 60%,#7a5d18);box-shadow:2px 4px 8px rgba(0,0,0,.6),0 0 10px rgba(217,168,73,.35)}
.bkey .bname{font-family:"Space Mono",monospace;font-weight:700;font-size:13px;color:#fff}
.bkey.sel .bname{color:#160f08}
.bkey .balt{font-size:10px;color:rgba(255,255,255,.55)}
.bkey.sel .balt{color:rgba(22,15,8,.6)}

/* Root display */
.root-display{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px 20px;border-radius:12px;border:2px solid var(--brass);background:rgba(217,168,73,.08);min-width:90px;min-height:90px}
.root-display .rd-label{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-dim)}
.root-display .rd-name{font-family:"Instrument Serif",serif;font-size:clamp(36px,4vw,52px);line-height:1;color:var(--brass)}

/* Chord badge + formula */
.chord-badge-row{margin-top:16px;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.chord-badge{display:flex;align-items:baseline;gap:8px;margin-top:16px;font-family:"Instrument Serif",serif;font-size:clamp(28px,3.5vw,44px);line-height:1;color:var(--cream)}
.chord-badge .root-part{color:var(--brass)}
.chord-badge .sym-part{color:var(--brass);font-size:.7em}
.formula-bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:14px}
.iv-pill{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid}

/* Chord selector */
.chord-selector{margin-top:20px}
.group-tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:12px;background:#0e0a07;border:1px solid var(--line);border-radius:9px;padding:3px;width:fit-content}
.group-tab{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;background:transparent;border:0;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:6px;transition:.12s;white-space:nowrap;font-weight:700}
.group-tab:hover{color:var(--cream)}
.group-tab.on{background:var(--brass);color:#160f08}
.chord-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chord-btn{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);cursor:pointer;padding:6px 13px;border-radius:8px;transition:.12s;text-align:left}
.chord-btn:hover{color:var(--cream);border-color:var(--brass-dim)}
.chord-btn.on{background:var(--brass);color:#160f08;border-color:var(--brass)}

/* Chord info */
.chord-info-wrap{margin-top:20px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:20px clamp(14px,2.4vw,24px)}
.chord-stack{display:flex;flex-direction:column;gap:5px}
.stack-row{display:flex;align-items:stretch;gap:8px;min-height:40px}
.stack-cat{font-family:"Space Mono",monospace;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);width:68px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;border-right:1px solid var(--line)}
.stack-blocks{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding-left:4px}
.stack-block{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;padding:7px 14px;min-width:54px;box-shadow:0 3px 12px rgba(0,0,0,.55)}
.sbn{font-size:20px;font-weight:700;line-height:1;font-family:"Space Mono",monospace}
.sbi{font-size:10px;font-weight:700;letter-spacing:.06em;margin-top:3px;text-transform:uppercase;opacity:.6}
.chord-desc-text{font-size:13.5px;line-height:1.72;color:var(--muted-2);margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.chord-desc-text p{margin:0 0 12px}
.chord-desc-text p:last-child{margin-bottom:0}
.chord-desc-text strong{color:var(--cream);font-weight:600}

/* Diagrams */
.diagrams-section{margin-top:30px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:20px clamp(14px,2.4vw,24px);box-shadow:0 24px 60px -40px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.03)}
.diagrams-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.diagrams-head h2{font-family:"Space Mono",monospace;font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2);margin:0}
.mode-seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.mode-seg button{background:none;border:none;padding:5px 11px;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:var(--muted-2);cursor:pointer;transition:.12s;letter-spacing:.05em;white-space:nowrap}
.mode-seg button.on{background:rgba(217,168,73,.18);color:var(--brass)}
.mode-seg button:hover:not(.on){background:rgba(255,255,255,.04)}
.play-btn{display:inline-flex;align-items:center;justify-content:center;padding:6px 14px;border-radius:7px;gap:6px;background:rgba(217,168,73,.15);border:1px solid var(--brass-dim);color:var(--brass);cursor:pointer;font-size:12px;font-family:"Space Mono",monospace;font-weight:700;transition:.12s;flex-shrink:0}
.play-btn:hover{background:rgba(217,168,73,.3)}
.play-btn.playing{background:var(--brass);color:#160f08}
.diagrams-container{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.no-voicings{color:var(--muted);font-size:14px;padding:20px 0;font-style:italic}
.diagram-card{background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:10px;padding:16px 16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:168px;cursor:pointer;transition:border-color .15s,background .15s}
.diagram-card:hover{border-color:var(--brass-dim)}
.diagram-card.selected{border-color:#fff;box-shadow:0 0 0 1px #fff4}
.diag-label{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}
.diag-play{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(217,168,73,.08);border:1px solid var(--brass-dim);color:var(--brass);cursor:pointer;font-size:10px;transition:.12s;font-family:"Space Mono",monospace;font-weight:700;padding:0}
.diag-play:hover{background:rgba(217,168,73,.22)}
.legend{margin-top:24px;display:flex;flex-wrap:wrap;gap:8px 16px;padding-top:16px;border-top:1px solid var(--line)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-family:"Space Mono",monospace}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

/* Fretboard */
.seg{display:inline-flex;background:#0e0a07;border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg button{font-family:"Space Mono",monospace;font-size:13px;background:transparent;border:0;color:var(--muted);cursor:pointer;padding:7px 13px;border-radius:7px;transition:.12s;white-space:nowrap}
.seg button:hover{color:var(--cream)}
.seg button.on{background:var(--brass);color:#160f08;font-weight:700}
.fb-section{margin-top:30px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:20px clamp(14px,2.4vw,24px);box-shadow:0 24px 60px -40px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.03)}
.fb-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.fb-head h2{font-family:"Space Mono",monospace;font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2);margin:0}
.fb-tools{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.fb-scroll{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.fretboard{--fret-w:54px;--open-w:40px;--label-w:28px;min-width:max-content}
.fb-strings{background:linear-gradient(180deg,#3a2510,#201408);border:1px solid #100a04;border-radius:5px;overflow:hidden;box-shadow:inset 0 2px 14px rgba(0,0,0,.55),0 16px 40px -30px #000;position:relative}
.fb-row{display:flex;align-items:center;height:42px;position:relative}
.fb-row+.fb-row{border-top:1px solid rgba(0,0,0,.4)}
.fb-row::after{content:"";position:absolute;left:var(--label-w);right:0;top:50%;height:var(--str-h,2px);transform:translateY(-50%);background:linear-gradient(180deg,rgba(255,255,255,.45),var(--brass-dim) 45%,rgba(0,0,0,.4));z-index:1;pointer-events:none}
.str-label{width:var(--label-w);flex:none;text-align:center;z-index:4;font-family:"Space Mono",monospace;font-weight:700;font-size:11px;color:var(--muted)}
.cell{width:var(--fret-w);flex:none;height:100%;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;border-right:2px solid rgba(20,12,5,.9);box-shadow:inset -1px 0 0 rgba(255,255,255,.08)}
.cell.open{width:var(--open-w);border-right:0;box-shadow:none}
.cell.nut-after::after{content:"";position:absolute;right:-1px;top:-1px;bottom:-1px;width:5px;background:linear-gradient(90deg,#efe6d3,#c8bb9c);z-index:3;border-radius:1px}
.cell.in-box{background:rgba(217,168,73,.12);box-shadow:inset -1px 0 0 rgba(255,255,255,.04),inset 0 0 0 100px rgba(217,168,73,.06)}
.dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Space Mono",monospace;font-weight:700;font-size:11px;color:#100608;box-shadow:0 3px 8px rgba(0,0,0,.5);position:relative;z-index:3;animation:fbpop .16s ease both}
@keyframes fbpop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.dot.root{box-shadow:0 0 0 3px rgba(255,255,255,.85),0 3px 8px rgba(0,0,0,.6)}
.fb-inlays{display:flex;margin-top:6px}
.fb-inlays .spacer{width:var(--label-w);flex:none}
.fb-inlays .ic{width:var(--fret-w);flex:none;display:flex;flex-direction:column;align-items:center;gap:4px}
.fb-inlays .ic.open{width:var(--open-w)}
.fb-inlays .inlay{width:7px;height:7px;border-radius:50%;background:var(--bone);opacity:.7}
.fb-inlays .fnum{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted-2)}
.fretboard.lefty .fb-row{flex-direction:row-reverse}
.fretboard.lefty .fb-inlays{flex-direction:row-reverse}
.fretboard.lefty .cell.nut-after::after{right:auto;left:-1px;background:linear-gradient(270deg,#efe6d3,#c8bb9c)}
.fretboard.lefty .str-label{order:1}
.pos-nav{display:flex;align-items:center;gap:6px}
.pos-nav button{width:32px;height:32px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--cream);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.pos-nav button:hover:not(:disabled){border-color:var(--brass-dim);color:var(--brass)}
.pos-nav button:disabled{opacity:.28;cursor:default}
.pos-counter{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:var(--muted);min-width:52px;text-align:center}

/* Family hint */
.family-hint{font-size:13px;font-style:italic;color:var(--muted);line-height:1.65;padding:9px 13px;background:rgba(217,168,73,.06);border-left:3px solid var(--brass);border-radius:0 6px 6px 0;margin-top:10px;display:none}
.family-hint.visible{display:block}

@media(max-width:760px){
  .eyebrow{flex-wrap:wrap;height:auto;gap:6px;padding-bottom:4px}
  .site-name{font-size:17px}
  .header-tools{width:100%}
  .site-nav{order:9;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .site-nav::-webkit-scrollbar{display:none}
  .piano-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .group-tabs{width:100%;overflow-x:auto}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo-bar" style="display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:8px">
    <div class="inst-bar" style="margin-bottom:0">
      <a class="inst-btn bass-btn active" href="accords-basse.html">Basse</a>
      <a class="inst-btn guit-btn" href="accords-guitare.html">Guitare</a>
    </div>
    <img src="img/logobasse.png" alt="ScalaBass" style="height:80px;display:block">
  </div>
  <div class="eyebrow">
    <span class="site-name">ScalaBass</span>
    <nav class="site-nav">
      <a href="index.html"         class="nav-link">Manche</a>
      <a href="gammes.html"        class="nav-link">Gammes</a>
      <a href="arpeges-basse.html" class="nav-link">Arpèges</a>
      <a href="accords-basse.html" class="nav-link active">Accords</a>
      <a href="intervalles.html"   class="nav-link">Intervalles</a>
      <a href="cadences.html"      class="nav-link">Cadences</a>
      <a href="analyse.html"       class="nav-link">Analyse</a>
      <a href="quintes.html"       class="nav-link">Tonalités</a>
    </nav>
    <div class="header-tools">
      <div class="htool-seg" id="notation-seg">
        <button data-notation="en" style="min-width:72px">A B C</button>
        <button data-notation="fr" style="min-width:72px">Do Ré Mi</button>
      </div>
      <div class="htool-divider"></div>
      <div class="htool-seg" id="lang-seg">
        <button data-lang="fr" style="min-width:34px">FR</button>
        <button data-lang="en" style="min-width:34px">EN</button>
      </div>
    </div>
  </div>
  <h1>Ac<em>cords</em></h1>
  <p class="lede" id="lede-text"></p>
</header>

<section class="controls">
  <div class="ctl-row">
    <div>
      <div class="ctl-label" id="lbl-tonique">Tonique</div>
      <div class="piano-wrap">
        <div class="piano" id="piano"></div>
        <div class="root-display">
          <span class="rd-label" id="lbl-note">Note</span>
          <span class="rd-name" id="rd-name">C</span>
        </div>
      </div>
    </div>
  </div>
  <div class="chord-badge-row">
    <div class="chord-badge"><span class="root-part" id="badge-root">C</span><span class="sym-part" id="badge-sym"></span></div>

function noteTbl(){
  const n=state.notation,a=state.accPref;
  return n==='fr'?(a==='#'?FR_SHRP:FR_FLAT):(a==='#'?EN_SHRP:EN_FLAT);
}
function spellPc(pc){return noteTbl()[pc];}
function spellByIv(root,iv){
  const LSTEP=[0,1,1,2,2,3,4,4,4,5,6,6];
  const LN=['C','D','E','F','G','A','B'];
  const LPC=[0,2,4,5,7,9,11];
  const FL=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
  const ri=LN.indexOf(FL[root][0]);
  const ti=(ri+LSTEP[iv%12])%7;
  const tp=(root+iv)%12;
  let d=tp-LPC[ti]; if(d>6)d-=12; if(d<-6)d+=12;
  const acc=d===1?'♯':d===-1?'♭':d===2?'𝄪':d===-2?'𝄫':'';
  if(state.notation==='fr'){const FR=['Do','Ré','Mi','Fa','Sol','La','Si'];return FR[ti]+acc;}
  return LN[ti]+acc;
}

/* ===== BASS VOICING SYSTEM ===== */

const OPC=[4,9,2,7];   // open pitch classes
const OMI=[28,33,38,43]; // open MIDI

// b = fret of root on each string
function eB(r){return(r-4+12)%12;}
function aB(r){return(r-9+12)%12;}
function dB(r){return(r-2+12)%12;}

// Shape functions → [E,A,D,G] fret array or null
// Interval derivation (from E string at fret b, relative semitones):
//   A string: 5+f-b  |  D string: 10+f-b  |  G string: 3+f-b  (all mod 12)
const E_SH={
  p5:       b=>[b,b+2,null,null],       // R(0) A:5+2=7=5th
  p4:       b=>[b,b,null,null],         // R(0) A:5+0=5=4th
  maj3:     b=>b>=1?[b,b-1,null,null]:null,  // A:5-1=4=3rd
  min3:     b=>b>=2?[b,b-2,null,null]:null,  // A:5-2=3=♭3
  oct_maj3: b=>[b,null,b+2,b+1],       // D:10+2=12=oct  G:3+1=4=3rd
  oct_min3: b=>[b,null,b+2,b],         // D:oct           G:3+0=3=♭3

  min:      b=>[b,b+2,b+2,b],          // A:5th  D:oct  G:♭3
  maj7:     b=>[b,b+2,b+1,b+1],        // A:5th  D:10+1=11=Δ7  G:4=3rd
  dom7:     b=>[b,b+2,b,b+1],          // A:5th  D:10+0=10=♭7  G:3rd
  min7:     b=>[b,b+2,b,b],            // A:5th  D:♭7   G:3+0=3=♭3
};
// Interval derivation (from A string at fret b):
//   D string: 5+f-b  |  G string: 10+f-b  (all mod 12)

  p5:    b=>[null,b,b+2,null],          // D:5+2=7=5th

  maj3:  b=>b>=1?[null,b,b-1,null]:null,  // D:5-1=4=3rd
  min3:  b=>b>=2?[null,b,b-2,null]:null,  // D:5-2=3=♭3
  maj:   b=>b>=3?[null,b,b-1,b-3]:null, // D:3rd  G:10-3=7=5th
  min:   b=>b>=3?[null,b,b-2,b-3]:null, // D:♭3   G:5th
  maj7:  b=>b>=1?[null,b,b-1,b+1]:null, // D:3rd  G:10+1=11=Δ7
  dom7:  b=>b>=1?[null,b,b-1,b]:null,   // D:3rd  G:10+0=10=♭7
  min7:  b=>b>=2?[null,b,b-2,b]:null,   // D:♭3   G:♭7
};
// Interval derivation (from D string at fret b):
//   G string: 5+f-b  (mod 12)
const D_SH={
  p5:   b=>[null,null,b,b+2],           // G:5+2=7=5th
  p4:   b=>[null,null,b,b],             // G:5+0=5=4th
  maj3: b=>b>=1?[null,null,b,b-1]:null, // G:5-1=4=3rd

function arrToVoicing(fa,rootPc,iv){
  const byPc={};iv.forEach(i=>{byPc[(rootPc+i)%12]=i;});
  return fa.map((f,s)=>{
    if(f===null)return null;
    const pc=(OPC[s]+f)%12;
    return{f,pc,iv:byPc[pc]!==undefined?byPc[pc]:0};
  });
}

function faValid(fa,rootPc,iv){
  const cPcs=new Set(iv.map(i=>(rootPc+i)%12));
  const rpc=rootPc%12;
  let hasRoot=false,count=0;
  const played=new Set();
  const fretted=[];
  for(let s=0;s<4;s++){
    const f=fa[s];if(f===null)continue;
    if(f<0)return false;
    count++;
    const pc=(OPC[s]+f)%12;
    if(!cPcs.has(pc))return false;
    if(pc===rpc)hasRoot=true;
    played.add(pc);
    if(f>0)fretted.push(f);
  }
  if(fretted.length>=2){
    const mx=Math.max(...fretted),mn=Math.min(...fretted);
    if(mx-mn>(count===2?7:4))return false;
  }
  return count>=1&&hasRoot&&played.size>=Math.min(iv.length,2);
}

function computeFingers(voicing){
  const fretted=voicing.map((v,s)=>v&&v.f>0?{s,f:v.f}:null).filter(Boolean);
  if(!fretted.length)return voicing.map(v=>v?0:null);
  const fvs=fretted.map(x=>x.f);
  const mn=Math.min(...fvs);
  const atMn=fretted.filter(x=>x.f===mn);
  const hasB=atMn.length>=2;
  const uniq=[...new Set(fvs)].sort((a,b)=>a-b);
  const other=hasB?uniq.filter(f=>f!==mn):uniq;
  const fm={};if(hasB)fm[mn]=1;
  const st=hasB?(other.length<=1?3:2):1;
  other.forEach((f,i)=>{fm[f]=Math.min(st+i,4);});
  return voicing.map(v=>{
    if(!v)return null;
    if(v.f===0)return 0;
    return fm[v.f]!==undefined?fm[v.f]:null;
  });
}

function computeVoicings(rootPc,chordId,ivArr){
  const results=[];const seen=new Set();
  function tryFa(fa,label){
    if(!fa)return;
    if(fa.some(f=>f!==null&&f<0))return;
    if(!faValid(fa,rootPc,ivArr))return;
    const key=fa.map(f=>f===null?'x':f).join(',');
    if(seen.has(key))return;seen.add(key);
    results.push({v:arrToVoicing(fa,rootPc,ivArr),label});
  }
  const eb=eB(rootPc),ab=aB(rootPc),db=dB(rootPc);
  // 1. Movable chord database first (labels take priority over generic E/A/D labels)
  const DB_MAP={maj:'major',min:'minor',dom7:'dom7',min7:'min7',maj7:'maj7'};
  const dbKey=DB_MAP[chordId];
  if(dbKey&&BASS_MOVABLE_CHORDS[dbKey]){
    BASS_MOVABLE_CHORDS[dbKey].forEach(({name,shape})=>{
      const ri=shape.indexOf(0);
      if(ri<0)return;
      const rootFret=[eb,ab,db][ri];
      if(rootFret===undefined)return;
      tryFa(shape.map(v=>v==='x'?null:rootFret+v),name);
    });
  }
  // 2. Built-in shape functions (fallback — catches dyads + unique A/D-root shapes)
  if(E_SH[chordId])tryFa(E_SH[chordId](eb),t('lbl_e'));
  if(A_SH[chordId])tryFa(A_SH[chordId](ab),t('lbl_a'));
  if(D_SH[chordId])tryFa(D_SH[chordId](db),t('lbl_d'));
  if(E_SH[chordId]&&eb===0)tryFa(E_SH[chordId](12),'XII');
  // 3. Open-position voicings (absolute frets; faValid rejects non-matching roots)
  const OC_MAP={maj:'major',min:'minor',dom7:'dom7',min7:'min7',maj7:'maj7'};
  const ocType=OC_MAP[chordId];
  if(ocType){
    Object.entries(BASS_OPEN_CHORDS).forEach(([name,{type,shape}])=>{
      if(type!==ocType)return;
      tryFa(shape.map(v=>v==='x'?null:v),name+' (ouvert)');
    });
  }
  return results;
}

/* ===== SVG DIAGRAM (4-string) ===== */
const NOTE_SVG=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function makeSVG(voicing,mode){
  if(!mode)mode=state.diagramMode;
  let v=[...voicing];
  let fg=computeFingers(v);
  if(state.hand==='left'){v=[...v].reverse();fg=[...fg].reverse();}
  const strNames=state.hand==='left'?['G','D','A','E']:['E','A','D','G'];

  const S=32,F=26,PL=18,PT=36,PB=18,N=4;
  const frets=v.map(x=>x?x.f:-1);
  const pNO=frets.filter(f=>f>0);
  const minFP=pNO.length?Math.min(...pNO):1;
  const maxFP=pNO.length?Math.max(...pNO):1;
  const sf=minFP<=2?0:minFP-1;
  const showNut=sf===0;
  const nF=Math.max(5,maxFP-sf+1);
  const W=PL*2+(N-1)*S,H=PT+nF*F+PB;

  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // String lines
  for(let s=0;s<N;s++){
    const x=PL+s*S;
    const sw=Math.max(0.6,2.0-s*0.4);
    svg+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${PT+nF*F}" stroke="#6f5f4c" stroke-width="${sw}"/>`;
  }
  // Fret lines
  for(let f=0;f<=nF;f++){
    const y=PT+f*F;
    if(showNut&&f===0){
      svg+=`<line x1="${PL}" y1="${y}" x2="${PL+(N-1)*S}" y2="${y}" stroke="#ece1cd" stroke-width="5" stroke-linecap="round"/>`;
    }else{
      svg+=`<line x1="${PL}" y1="${y}" x2="${PL+(N-1)*S}" y2="${y}" stroke="#4a1525" stroke-width="1"/>`;
    }
  }
  // Fret number
  if(!showNut){
    svg+=`<text x="${PL+(N-1)*S+8}" y="${PT+F*.5}" font-family="Space Mono,monospace" font-size="10" fill="#9d8a72" text-anchor="start" dominant-baseline="central">${sf+1}</text>`;
  }
  // Inlays
  const INLAYS=[3,5,7,9,12,15,17,19];
  for(const af of INLAYS){
    const rel=af-sf;
    if(rel>=1&&rel<=nF){
      const cy=PT+(rel-0.5)*F;
      const cx=PL+(N-1)*S/2;
      if(af===12){
        svg+=`<circle cx="${cx-8}" cy="${cy}" r="2.5" fill="#4a1525" opacity=".7"/>`;
        svg+=`<circle cx="${cx+8}" cy="${cy}" r="2.5" fill="#4a1525" opacity=".7"/>`;
      }else{
        svg+=`<circle cx="${cx}" cy="${cy}" r="2.5" fill="#4a1525" opacity=".7"/>`;
      }
    }
  }
  // Markers
  for(let s=0;s<N;s++){
    const x=PL+s*S;
    const vi=v[s];
    if(vi===null){
      svg+=`<line x1="${x-5}" y1="${PT-20}" x2="${x+5}" y2="${PT-10}" stroke="#e8503a" stroke-width="1.8"/>`;
      svg+=`<line x1="${x+5}" y1="${PT-20}" x2="${x-5}" y2="${PT-10}" stroke="#e8503a" stroke-width="1.8"/>`;
    }else if(vi.f===0){
      const col=IV_COLOR[vi.iv]||'#d9a849';
      const tc=isDark(col)?'#ece1cd':'#0c0306';
      let lbl,fs;
      if(mode==='fingering'){lbl='0';fs=8;}
      else if(mode==='note'){lbl=NOTE_SVG[vi.pc];fs=lbl.length>2?7:8;}
      else{lbl=ivLbl(vi.iv);fs=lbl.length>2?7:8;}
      svg+=`<circle cx="${x}" cy="${PT-13}" r="8" fill="${col}"/>`;
      svg+=`<text x="${x}" y="${PT-13}" font-family="Space Mono,monospace" font-size="${fs}" fill="${tc}" text-anchor="middle" font-weight="700" dominant-baseline="central">${lbl}</text>`;
    }else{
      const rel=vi.f-sf;
      const cy=PT+(rel-0.5)*F;
      const col=IV_COLOR[vi.iv]||'#d9a849';
      const tc=isDark(col)?'#ece1cd':'#0c0306';
      svg+=`<circle cx="${x}" cy="${cy}" r="11" fill="${col}"/>`;
      let lbl,fs;
      if(mode==='fingering'){lbl=fg&&fg[s]!==null?(fg[s]===0?'0':String(fg[s])):'?';fs=11;}
      else if(mode==='note'){lbl=NOTE_SVG[vi.pc];fs=lbl.length>2?9:10;}
      else{lbl=ivLbl(vi.iv);fs=lbl.length>2?9:10;}
      svg+=`<text x="${x}" y="${cy}" font-family="Space Mono,monospace" font-size="${fs}" fill="${tc}" text-anchor="middle" font-weight="700" dominant-baseline="central">${lbl}</text>`;
    }
  }
  // String name labels
  for(let s=0;s<N;s++){
    const x=PL+s*S;
    const anchor=s===0?'start':s===N-1?'end':'middle';
    svg+=`<text x="${x}" y="${H-3}" font-family="Space Mono,monospace" font-size="7" fill="#6f5f4c" text-anchor="${anchor}">${strNames[s]}</text>`;
  }
  svg+='</svg>';
  return svg;
}

/* ===== AUDIO ===== */
let _sf=null,_ctx=null,_loading=false;
async function initAudio(){
  if(_sf)return _sf;if(_loading)return null;_loading=true;
  try{
    _ctx=new(window.AudioContext||window.webkitAudioContext)();
    _sf=await Soundfont.instrument(_ctx,'electric_bass_finger',{
      soundfont:'MusyngKite',
      nameToUrl:(n,sf,fmt)=>`https://gleitz.github.io/midi-js-soundfonts/${sf}/${n}-${fmt}.js`,
      format:'mp3',gain:2.5,
    });
    return _sf;
  }catch(e){_loading=false;return null;}
}

async function playVoicing(voicing){
  const inst=await initAudio();if(!inst)return;
  if(_ctx.state==='suspended')await _ctx.resume();
  const notes=[];
  for(let s=0;s<4;s++){
    const vi=voicing[s];if(!vi)continue;
    notes.push(Math.max(24,Math.min(84,OMI[s]+(vi.f||0))));
  }
  if(!notes.length)return;
  notes.forEach((m,i)=>_sf.play(m,_ctx.currentTime+i*0.06,{duration:1.8,gain:3.0-i*0.2}));
}

let _voicings=[];

async function playAll(){
  if(!_voicings.length)return;
  const btn=document.getElementById('play-all-btn');
  if(btn.classList.contains('playing'))return;
  btn.classList.add('playing');btn.textContent=t('lbl_stop');
  const entry=_voicings[Math.min(state.selCard,_voicings.length-1)];
  try{await playVoicing(entry.v);}catch(e){}
  setTimeout(()=>{btn.classList.remove('playing');btn.textContent=t('lbl_jouer');},2400);
}

function renderChordInfo(cd){
  const wrap=document.getElementById('chord-info-wrap');

  const rows=[];
  const septs=cd.iv.filter(iv=>iv===9||iv===10||iv===11);
  const fifths=cd.iv.filter(iv=>iv===5||iv===6||iv===7||iv===8);
  const thirds=cd.iv.filter(iv=>iv===3||iv===4);
  const funds=cd.iv.filter(iv=>iv===0);
  if(septs.length)rows.push({label:t('row_sept'),ivs:septs});
  if(fifths.length)rows.push({label:t('row_quinte'),ivs:fifths});
  if(thirds.length)rows.push({label:t('row_tierce'),ivs:thirds});
  if(funds.length)rows.push({label:t('row_fond'),ivs:funds});

  const stack=document.getElementById('chord-stack');stack.innerHTML='';
  rows.forEach(({label,ivs})=>{

    const cat=document.createElement('div');cat.className='stack-cat';cat.textContent=label;
    const blocks=document.createElement('div');blocks.className='stack-blocks';
    ivs.forEach(iv=>{
      const col=IV_COLOR[iv]||'#d9a849';const tc=isDark(col)?'#ece1cd':'#0c0306';

}

/* ===== FRETBOARD ===== */
const BASS_STRING_NAMES=['E','A','D','G'];

function buildPositionButtons(n){
  const c=document.getElementById('fb-position');if(!c)return;
  c.innerHTML='';
  if(!n){return;}
  if(state.selCard>=n)state.selCard=0;
  const pos=state.selCard+1;
  const wrap=document.createElement('div');wrap.className='pos-nav';
  const prev=document.createElement('button');prev.textContent='←';prev.disabled=pos<=1;
  prev.onclick=()=>{state.selCard=Math.max(0,state.selCard-1);renderDiagrams(_voicings,chordDef());renderFretboard(chordDef());};
  const ctr=document.createElement('span');ctr.className='pos-counter';ctr.textContent=pos+' / '+n;
  const next=document.createElement('button');next.textContent='→';next.disabled=pos>=n;
  next.onclick=()=>{state.selCard=Math.min(n-1,state.selCard+1);renderDiagrams(_voicings,chordDef());renderFretboard(chordDef());};
  wrap.appendChild(prev);wrap.appendChild(ctr);wrap.appendChild(next);c.appendChild(wrap);
}

function renderFretboard(cd){
  const fb=document.getElementById('fretboard');if(!fb)return;
  fb.innerHTML='';
  fb.classList.toggle('lefty',state.hand==='left');
  buildPositionButtons(_voicings.length);
  if(!cd||!_voicings.length)return;

  const entry=_voicings[Math.min(state.selCard,_voicings.length-1)];
  const voicing=entry?entry.v:null;
  if(!voicing)return;
  const pcToIv={};cd.iv.forEach(iv=>{pcToIv[(state.rootPc+iv)%12]=iv;});
  const highlightSet=new Set();
  const mutedStrings=new Set();
  voicing.forEach((x,s)=>{if(x){highlightSet.add(s+':'+x.f);pcToIv[x.pc]=x.iv;}else{mutedStrings.add(s);}});
  const fingering=computeFingers(voicing);
  const nonOpen=voicing.filter(x=>x&&x.f>0);
  let box={start:0,end:3};
  if(nonOpen.length){const minF=Math.min(...nonOpen.map(x=>x.f));const maxF=Math.max(...nonOpen.map(x=>x.f));box={start:Math.max(0,minF-1),end:maxF+1};}
  const fCount=Math.min(24,Math.max(state.frets,box.end));
  const dispPcs=[...OPC].reverse();
  const dispNames=[...BASS_STRING_NAMES].reverse();
  const strDiv=document.createElement('div');strDiv.className='fb-strings';

  dispPcs.forEach((sPc,di)=>{
    const origIdx=3-di;
    const th=(1.3+di*.45).toFixed(1);
    const row=document.createElement('div');row.className='fb-row';row.style.setProperty('--str-h',th+'px');
    const lab=document.createElement('div');lab.className='str-label';
    if(mutedStrings.has(origIdx)){lab.innerHTML='<span style="display:block;font-size:9px;color:var(--muted-2)">'+dispNames[di]+'</span><span style="display:block;color:#e8503a;font-size:13px;line-height:1;font-weight:700">×</span>';}
    else{lab.textContent=dispNames[di];}
    row.appendChild(lab);
    for(let f=0;f<=fCount;f++){
      const inBox=box&&f>=box.start&&f<=box.end;
      const cell=document.createElement('div');cell.className='cell'+(f===0?' open nut-after':'')+(inBox?' in-box':'');
      const pc=(sPc+f)%12;
      const iv=pcToIv[pc];
      if(iv!==undefined&&highlightSet.has(origIdx+':'+f)){
        const d=document.createElement('div');d.className='dot'+(iv===0?' root':'');
        const col=IV_COLOR[iv]||'#d9a849';d.style.background=col;d.style.color=isDark(col)?'#ece1cd':'#100608';
        if(state.display==='fingering')d.textContent=fingering[origIdx]>0?String(fingering[origIdx]):'';
        else d.textContent=state.display==='note'?spellPc(pc):ivLbl(iv);
        cell.appendChild(d);
      }
      row.appendChild(cell);
    }
    strDiv.appendChild(row);
  });
  fb.appendChild(strDiv);

  const inl=document.createElement('div');inl.className='fb-inlays';
  inl.appendChild(Object.assign(document.createElement('div'),{className:'spacer'}));
  const SINGLE=[3,5,7,9,15,17,19,21],DOUBLE=[12,24];
  for(let f=0;f<=fCount;f++){
    const ic=document.createElement('div');ic.className='ic'+(f===0?' open':'');
    if(DOUBLE.includes(f)){const dbl=document.createElement('div');dbl.style.cssText='display:flex;gap:5px';dbl.innerHTML='<div class="inlay"></div><div class="inlay"></div>';ic.appendChild(dbl);}
    else if(SINGLE.includes(f)){const a=document.createElement('div');a.className='inlay';ic.appendChild(a);}
    else{const a=document.createElement('div');a.style.height='7px';ic.appendChild(a);}
    const num=document.createElement('div');num.className='fnum';num.textContent=f===0?'0':f;ic.appendChild(num);inl.appendChild(ic);
  }
  fb.appendChild(inl);
}

document.getElementById('lang-seg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||!b.dataset.lang)return;
  state.lang=b.dataset.lang;localStorage.setItem('sblang',state.lang);
  document.querySelectorAll('#lang-seg button').forEach(x=>x.classList.toggle('on',x===b));
  render();
});
document.getElementById('diag-mode-seg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||!b.dataset.mode)return;
  state.diagramMode=b.dataset.mode;
  document.querySelectorAll('#diag-mode-seg button').forEach(x=>x.classList.toggle('on',x===b));
  renderDiagrams(_voicings,chordDef());
  renderFretboard(chordDef());
});
document.getElementById('diag-hand-seg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||!b.dataset.dhand)return;
  state.hand=b.dataset.dhand;
  document.querySelectorAll('#diag-hand-seg button').forEach(x=>x.classList.toggle('on',x===b));
  renderDiagrams(_voicings,chordDef());
  renderFretboard(chordDef());
});
document.getElementById('fb-display').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||!b.dataset.disp)return;
  state.display=b.dataset.disp;
  document.querySelectorAll('#fb-display button').forEach(x=>x.classList.toggle('on',x===b));
  renderFretboard(chordDef());
});
document.getElementById('fb-frets-ctl').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||!b.dataset.frets)return;
  state.frets=+b.dataset.frets;
  document.querySelectorAll('#fb-frets-ctl button').forEach(x=>x.classList.toggle('on',x===b));
  renderFretboard(chordDef());
});
document.getElementById('fb-hand').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||!b.dataset.hand)return;
  state.hand=b.dataset.hand;
  document.querySelectorAll('#fb-hand button,#diag-hand-seg button').forEach(x=>x.classList.toggle('on',(x.dataset.hand||x.dataset.dhand)===state.hand));
  renderDiagrams(_voicings,chordDef());
  renderFretboard(chordDef());
});
document.getElementById('play-all-btn').addEventListener('click',playAll);

/* ===== INIT ===== */
(function(){
  document.querySelectorAll('#notation-seg button').forEach(b=>{
    b.classList.toggle('on',b.dataset.notation===state.notation);
  });
  document.querySelectorAll('#lang-seg button').forEach(b=>{
    b.classList.toggle('on',b.dataset.lang===state.lang);
  });
  buildPiano();
  render();
})();
</script>
</body>
</html>
