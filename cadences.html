<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScalaBass — Cadences</title>
<meta name="description" content="37 cadences de basse par genre : jazz, blues, rock, pop, métal, flamenco, gipsy, ska et plus. Notes, accords et positions sur le manche.">
<meta name="keywords" content="cadences basse, ii-V-I basse, progressions accords basse, cadence jazz basse, cadence blues basse">
<meta property="og:title" content="ScalaBass — Cadences">
<meta property="og:description" content="37 cadences classées par genre avec accords et manche de basse.">
<meta property="og:type" content="website">
<link rel="canonical" href="https://labussiere21.github.io/Gammes/cadences.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15100c; --bg-2:#1d160f; --panel:#241a12; --panel-2:#2c2016;
    --line:#3a2c1e; --wood-a:#4a3320; --wood-b:#2c1d12;
    --brass:#d9a849; --brass-dim:#9c7a3a;
    --bone:#efe6d3; --cream:#ece1cd; --muted:#9d8a72; --muted-2:#6f5f4c;
    --d1:#e8503a; --d2:#f08a3c; --d3:#f2c14e; --d4:#57c08a;
    --d5:#45a3d9; --d6:#8c7bd6; --d7:#e06aa8; --d8:#60c8a0;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    background:
      radial-gradient(1100px 550px at 80% -10%, rgba(217,168,73,.09), transparent 58%),
      radial-gradient(800px 480px at -8% 105%, rgba(217,168,73,.06), transparent 52%),
      var(--bg);
    color:var(--cream); font-family:"Hanken Grotesk",system-ui,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:clamp(20px,4vw,52px) clamp(16px,4vw,40px) 80px}

  /* Nav */
  header{margin-bottom:30px}
  .eyebrow{font-family:"Space Mono",monospace; letter-spacing:.28em; text-transform:uppercase; font-size:12px; color:var(--brass); display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:14px;}
  .site-name{font-weight:700; letter-spacing:.2em}
  .site-nav{display:flex; gap:2px; background:#0e0a07; border:1px solid var(--line); border-radius:8px; padding:3px}
  .nav-link{font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); text-decoration:none; padding:5px 12px; border-radius:5px; transition:.12s;}
  .nav-link:hover{color:var(--cream)}
  .nav-link.active{background:var(--brass); color:#160f08; font-weight:700}
  h1{font-family:"Instrument Serif",serif; font-weight:400; font-size:clamp(42px,7.5vw,82px); line-height:.95; margin:.12em 0 .1em;}
  h1 em{font-style:italic; color:var(--brass)}
  .lede{color:var(--muted); max-width:64ch; font-size:clamp(14px,1.4vw,16px)}

  /* Controls */
  .controls{
    margin-top:26px;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:20px clamp(14px,2.4vw,24px);
    box-shadow:0 24px 60px -40px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.03);
  }
  .ctl-label{font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted-2); margin-bottom:9px;}
  .ctl-row{display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start}

  /* Piano */
  .piano-wrap{display:flex; gap:18px; align-items:flex-end; flex-wrap:wrap}
  .piano{position:relative; display:flex; align-items:flex-end; height:140px; user-select:none; background:#0c0906; padding:8px 8px 0; border-radius:10px; border:1px solid var(--line); box-shadow:0 8px 24px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.04);}
  .wkey{position:relative; width:44px; height:112px; background:linear-gradient(180deg,#f8f2e8,#e8dfc8 70%,#d4c9ad); border:1px solid #2a1e12; border-radius:0 0 7px 7px; margin:0 1.5px; cursor:pointer; color:#3a2c1e; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding-bottom:10px; gap:3px; font-weight:700; font-size:13px; transition:background .1s,transform .05s; box-shadow:inset 0 -3px 6px rgba(0,0,0,.15),2px 0 0 rgba(0,0,0,.1);}
  .wkey:hover{background:linear-gradient(180deg,#fff9ee,#ede1c4)}
  .wkey:active{transform:translateY(2px)}
  .wkey.sel{background:linear-gradient(180deg,var(--brass),#c9952d 70%,#a07820); color:#160f08; box-shadow:inset 0 -2px 5px rgba(0,0,0,.3),0 0 12px rgba(217,168,73,.4);}
  .wkey .wlabel{font-size:12px; font-weight:700; line-height:1}
  .bkey{position:absolute; top:8px; width:30px; height:82px; z-index:3; background:linear-gradient(180deg,#1e1508,#0a0704 60%,#1a1208); border:1px solid #000; border-top:none; border-radius:0 0 6px 6px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding-bottom:8px; gap:2px; line-height:1; box-shadow:2px 4px 8px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.07); transition:background .1s,transform .05s;}
  .bkey:hover{background:linear-gradient(180deg,#2e2010,#100b06)}
  .bkey:active{transform:translateY(2px)}
  .bkey.sel{background:linear-gradient(180deg,var(--brass),#9c7520 60%,#7a5d18); box-shadow:2px 4px 8px rgba(0,0,0,.6),0 0 10px rgba(217,168,73,.35);}
  .bkey .bname{font-family:"Space Mono",monospace; font-weight:700; font-size:11px; color:var(--cream)}
  .bkey.sel .bname{color:#160f08}
  .bkey .balt{font-size:9px; color:var(--muted-2)}
  .bkey.sel .balt{color:rgba(22,15,8,.6)}

  /* Segments */
  .seg{display:inline-flex; background:#0e0a07; border:1px solid var(--line); border-radius:9px; padding:3px; gap:2px}
  .seg button{font-family:"Space Mono",monospace; font-size:13px; background:transparent; border:0; color:var(--muted); cursor:pointer; padding:7px 13px; border-radius:7px; transition:.12s;}
  .seg button:hover{color:var(--cream)}
  .seg button.on{background:var(--brass); color:#160f08; font-weight:700}

  /* Sélecteur genre */
  .genre-tabs{display:flex; flex-wrap:wrap; gap:6px; margin-top:18px}
  .gtab{font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; background:#100b07; border:1px solid var(--line); color:var(--muted); padding:6px 13px; border-radius:999px; transition:.12s;}
  .gtab:hover{border-color:var(--brass-dim); color:var(--cream)}
  .gtab.on{font-weight:700}

  /* Couleurs par genre */
  .gtab[data-genre="Jazz"].on, .cadence-card[data-genre="Jazz"] .cad-genre{background:rgba(69,163,217,.18); border-color:#45a3d9; color:#45a3d9}
  .gtab[data-genre="Blues"].on{background:rgba(232,80,58,.18); border-color:#e8503a; color:#e8503a}
  .gtab[data-genre="Rock"].on{background:rgba(240,138,60,.18); border-color:#f08a3c; color:#f08a3c}
  .gtab[data-genre="Pop"].on{background:rgba(140,123,214,.18); border-color:#8c7bd6; color:#8c7bd6}
  .gtab[data-genre="Metal"].on{background:rgba(100,100,120,.25); border-color:#888; color:#bbb}
  .gtab[data-genre="Punk"].on{background:rgba(224,106,168,.18); border-color:#e06aa8; color:#e06aa8}
  .gtab[data-genre="Ska"].on{background:rgba(87,192,138,.18); border-color:#57c08a; color:#57c08a}
  .gtab[data-genre="Flamenco"].on{background:rgba(242,193,78,.18); border-color:#f2c14e; color:#f2c14e}
  .gtab[data-genre="Gipsy"].on{background:rgba(242,193,78,.15); border-color:#c8a840; color:#c8a840}
  .gtab[data-genre="Classique"].on{background:rgba(96,200,160,.18); border-color:#60c8a0; color:#60c8a0}
  .gtab[data-genre="Funk"].on{background:rgba(232,80,58,.15); border-color:#d06040; color:#d06040}
  .gtab[data-genre="Gospel"].on{background:rgba(87,192,138,.15); border-color:#40b87a; color:#40b87a}
  .gtab[data-genre="Latin"].on{background:rgba(240,138,60,.15); border-color:#d08020; color:#d08020}
  .gtab[data-genre="all"].on{background:rgba(217,168,73,.18); border-color:var(--brass); color:var(--brass)}

  /* Grille cadences */
  .cadences-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; margin-top:20px}
  .cadence-card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line); border-radius:12px; padding:16px 18px;
    cursor:pointer; transition:.14s;
    box-shadow:0 8px 24px -16px rgba(0,0,0,.8);
  }
  .cadence-card:hover{border-color:var(--brass-dim); transform:translateY(-1px)}
  .cadence-card.active{border-color:var(--brass); box-shadow:0 0 0 2px rgba(217,168,73,.3),0 8px 24px -16px rgba(0,0,0,.8)}
  .cad-header{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px}
  .cad-label{font-family:"Instrument Serif",serif; font-size:20px; color:var(--cream); line-height:1.1}
  .cad-genre{font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:3px 8px; border-radius:5px; border:1px solid var(--line); color:var(--muted); flex:none}
  .cad-desc{font-size:12px; color:var(--muted-2); margin-bottom:10px}
  .cad-degrees{display:flex; gap:5px; flex-wrap:wrap}
  .cad-deg{
    font-family:"Space Mono",monospace; font-size:12px; font-weight:700;
    padding:4px 8px; border-radius:6px; background:#0f0a07; border:1px solid var(--line);
  }

  /* Zone résultat */
  .result-zone{margin-top:24px}
  .result-head{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:16px}
  .result-title{font-family:"Instrument Serif",serif; font-size:clamp(24px,3vw,34px); line-height:1}
  .result-title b{color:var(--brass)}
  .result-title .rtag{font-size:.45em; color:var(--muted); font-family:"Space Mono",monospace}

  /* Navigation accord par accord */
  .chord-nav{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .chord-nav-btns{display:flex; gap:0}
  .chord-nav-btns button{
    font-family:"Space Mono",monospace; font-weight:700; font-size:13px;
    background:#100b07; border:1px solid var(--line); color:var(--muted);
    padding:8px 16px; cursor:pointer; transition:.12s;
  }
  .chord-nav-btns button:first-child{border-radius:8px 0 0 8px; border-right:none}
  .chord-nav-btns button:last-child{border-radius:0 8px 8px 0}
  .chord-nav-btns button:hover{color:var(--cream); background:#1a1208}
  .chord-nav-btns button:disabled{opacity:.3; cursor:not-allowed}
  .chord-counter{font-family:"Space Mono",monospace; font-size:12px; color:var(--muted)}

  /* Cartes d'accords (vue globale) */
  .chords-overview{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px}
  .chord-pill{
    flex:1; min-width:110px;
    padding:14px 12px; border-radius:12px;
    background:#100b07; border:2px solid var(--line);
    text-align:center; cursor:pointer; transition:.12s;
  }
  .chord-pill:hover{border-color:var(--brass-dim)}
  .chord-pill.active{border-color:var(--brass); background:rgba(217,168,73,.08)}
  .chord-pill .cp-deg{font-family:"Space Mono",monospace; font-size:11px; color:var(--muted); margin-bottom:4px}
  .chord-pill .cp-name{font-family:"Instrument Serif",serif; font-size:22px; line-height:1}
  .chord-pill .cp-notes{font-family:"Space Mono",monospace; font-size:11px; color:var(--muted-2); margin-top:5px}
  .chord-pill.active .cp-name{color:var(--brass)}
  .chord-pill.active .cp-deg{color:var(--brass-dim)}

  /* Info accord actif */
  .chord-info{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 22px; margin-bottom:16px;
    display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  }
  .ci-name{font-family:"Instrument Serif",serif; font-size:clamp(28px,4vw,42px); color:var(--brass); line-height:1}
  .ci-formula{font-family:"Space Mono",monospace; font-size:13px; color:var(--muted); margin-top:4px}
  .ci-notes{display:flex; gap:7px; flex-wrap:wrap}
  .ci-note{
    font-family:"Space Mono",monospace; font-weight:700; font-size:14px;
    padding:5px 10px; border-radius:7px; background:#0f0a07; border:1px solid var(--line);
  }

  /* Manche */
  .fb-card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:20px clamp(14px,2vw,22px);
    box-shadow:0 24px 60px -44px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.03);
  }
  .fb-head{display:flex; justify-content:space-between; align-items:flex-end; gap:14px; flex-wrap:wrap; margin-bottom:16px}
  .fb-head h2{font-family:"Space Mono",monospace; font-weight:700; font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted-2); margin:0}
  .fb-tools{display:flex; gap:12px; flex-wrap:wrap; align-items:center}
  .fb-scroll{overflow-x:auto; padding-bottom:6px}
  .fretboard{--fret-w:62px; --open-w:46px; --label-w:30px; min-width:max-content; margin:0 auto}
  .fb-strings{background:linear-gradient(180deg,var(--wood-a),var(--wood-b)); border:1px solid #120c07; border-radius:5px; overflow:hidden; box-shadow:inset 0 2px 14px rgba(0,0,0,.55),0 16px 40px -30px #000;}
  .fb-row{display:flex; align-items:center; height:46px; position:relative}
  .fb-row+.fb-row{border-top:1px solid rgba(0,0,0,.18)}
  .fb-row::after{content:""; position:absolute; left:var(--label-w); right:0; top:50%; height:var(--str-h,2px); transform:translateY(-50%); background:linear-gradient(180deg,rgba(255,255,255,.5),var(--brass-dim) 45%,rgba(0,0,0,.4)); z-index:1; pointer-events:none;}
  .str-label{width:var(--label-w); flex:none; text-align:center; z-index:4; font-family:"Space Mono",monospace; font-weight:700; font-size:13px; color:var(--muted)}
  .cell{width:var(--fret-w); flex:none; height:100%; display:flex; align-items:center; justify-content:center; position:relative; z-index:2; border-right:1px solid rgba(20,12,6,.55); box-shadow:inset -1px 0 0 rgba(255,255,255,.04)}
  .cell.open{width:var(--open-w); border-right:0; box-shadow:none}
  .cell.nut-after::after{content:""; position:absolute; right:-1px; top:-1px; bottom:-1px; width:5px; background:linear-gradient(90deg,#efe6d3,#c8bb9c); z-index:3; border-radius:1px}
  .dot{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:"Space Mono",monospace; font-weight:700; font-size:13px; color:#160f08; box-shadow:0 3px 8px rgba(0,0,0,.5); position:relative; z-index:3; animation:pop .15s ease both;}
  .dot.root{box-shadow:0 0 0 3px rgba(255,255,255,.85),0 3px 8px rgba(0,0,0,.6)}
  @keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
  /* Gaucher */
  .fretboard.lefty .fb-row{flex-direction:row-reverse}
  .fretboard.lefty .fb-inlays{flex-direction:row-reverse}
  .fretboard.lefty .cell.nut-after::after{right:auto;left:-1px;background:linear-gradient(270deg,#efe6d3,#c8bb9c)}
  .fretboard.lefty .str-label{order:1}
  /* Inlays */
  .fb-inlays{display:flex; margin-top:7px}
  .fb-inlays .spacer{width:var(--label-w); flex:none}
  .fb-inlays .ic{width:var(--fret-w); flex:none; display:flex; flex-direction:column; align-items:center; gap:5px}
  .fb-inlays .ic.open{width:var(--open-w)}
  .fb-inlays .inlay{width:8px; height:8px; border-radius:50%; background:var(--bone); opacity:.85}
  .fb-inlays .fnum{font-family:"Space Mono",monospace; font-size:11px; color:var(--muted-2)}

  /* Légende */
  .legend{display:flex; flex-wrap:wrap; gap:6px 16px; margin-top:14px; padding-top:14px; border-top:1px solid var(--line)}
  .legend-item{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted)}
  .leg-dot{width:12px; height:12px; border-radius:50%}
  .leg-root{box-shadow:0 0 0 2px rgba(255,255,255,.75)}

  :focus-visible{outline:2px solid var(--brass); outline-offset:2px; border-radius:4px}
  @media(prefers-reduced-motion:reduce){.dot{animation:none}}
  @media(max-width:640px){.chords-overview{gap:7px}.chord-pill{min-width:90px;padding:10px 8px}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">
      <span class="site-name">ScalaBass</span>
      <nav class="site-nav">
        <a href="index.html"          class="nav-link">Gammes</a>
        <a href="arpeges-basse.html"  class="nav-link">Arpèges</a>
        <a href="intervalles.html"    class="nav-link">Intervalles</a>
        <a href="manche.html"         class="nav-link">Manche</a>
        <a href="cadences.html"       class="nav-link active">Cadences</a>
      </nav>
    </div>
    <h1>Ca<em>dences</em></h1>
    <p class="lede">37 cadences classées par genre — Jazz, Blues, Rock, Metal, Flamenco, Gipsy et plus. Choisis une tonique, clique sur une cadence, navigue accord par accord sur le manche.</p>
  </header>

  <!-- Contrôles -->
  <section class="controls">
    <div class="ctl-row">
      <div>
        <div class="ctl-label">Tonique</div>
        <div class="piano-wrap">
          <div class="piano" id="piano"></div>
          <div style="display:flex;flex-direction:column;gap:12px">
            <div>
              <div class="ctl-label">Altération</div>
              <div class="seg" id="accpref" role="group">
                <button data-acc="b" class="on">♭ bémols</button>
                <button data-acc="#">♯ dièses</button>
              </div>
            </div>
            <div>
              <div class="ctl-label">Main</div>
              <div class="seg" id="fb-hand" role="group">
                <button data-hand="right" class="on">🤜 Droitier</button>
                <button data-hand="left">Gaucher 🤛</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="ctl-label">Cases</div>
        <div class="seg" id="fb-frets-ctl" role="group">
          <button data-frets="12" class="on">12</button>
          <button data-frets="15">15</button>
          <button data-frets="24">24</button>
        </div>
      </div>
    </div>
    <!-- Filtres genre -->
    <div style="margin-top:18px">
      <div class="ctl-label">Genre</div>
      <div class="genre-tabs" id="genre-tabs"></div>
    </div>
  </section>

  <!-- Grille cadences -->
  <div class="cadences-grid" id="cadences-grid"></div>

  <!-- Zone résultat (cachée si aucune sélection) -->
  <div class="result-zone" id="result-zone" style="display:none">
    <div class="result-head">
      <div class="result-title" id="result-title"></div>
      <div class="chord-nav">
        <div class="chord-nav-btns">
          <button id="btn-prev" onclick="navigate(-1)">← Préc.</button>
          <button id="btn-next" onclick="navigate(+1)">Suiv. →</button>
        </div>
        <span class="chord-counter" id="chord-counter"></span>
      </div>
    </div>

    <!-- Vue globale : toutes les cartes d'accords -->
    <div class="chords-overview" id="chords-overview"></div>

    <!-- Info accord actif -->
    <div class="chord-info" id="chord-info"></div>

    <!-- Manche -->
    <div class="fb-card">
      <div class="fb-head">
        <h2>Sur le manche</h2>
        <div class="fb-tools">
          <div>
            <div class="ctl-label">Afficher</div>
            <div class="seg" id="fb-display" role="group">
              <button data-disp="note" class="on">Notes</button>
              <button data-disp="deg">Degrés</button>
            </div>
          </div>
        </div>
      </div>
      <div class="fb-scroll"><div class="fretboard" id="fretboard"></div></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

</div>

<script>
/* ============================================================ DONNÉES */
const CHORD_COLORS = ['var(--d1)','var(--d2)','var(--d3)','var(--d4)','var(--d5)','var(--d6)','var(--d7)','var(--d8)'];

const CADENCES = [
  // JAZZ

const GENRES = ['all',...[...new Set(CADENCES.map(c=>c.genre))]];
const CHORD_INTERVALS = {
  '':    [0,4,7], 'm':[0,3,7], '7':[0,4,7,10], 'm7':[0,3,7,10],
  'maj7':[0,4,7,11], 'm7b5':[0,3,6,10], 'dim':[0,3,6], 'dim7':[0,3,6,9],
  '5':[0,7], '7b9':[0,4,7,10,1],
};
const CHORD_LABEL = {
  '':'', 'm':'m', '7':'7', 'm7':'m7', 'maj7':'maj7',
  'm7b5':'m7♭5', 'dim':'°', 'dim7':'°7', '5':'5', '7b9':'7♭9',
};
const DEG_ROMAN = ['','I','II','III','IV','V','VI','VII'];
const DEG_ROMAN_MIN = ['','i','ii','iii','iv','v','vi','vii'];
const SCALE_MAJOR = [0,2,4,5,7,9,11];
const SCALE_MINOR = [0,2,3,5,7,8,10];
const FLAT_SPELL  = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];
const SHARP_SPELL = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

function spell(pc){ return (state.accPref==='#'?SHARP_SPELL:FLAT_SPELL)[pc]; }

function degPc(rootPc, degNum, mode){
  const scale = mode==='minor' ? SCALE_MINOR : SCALE_MAJOR;
  const idx = ((degNum-1)+7)%7;
  return (rootPc + scale[idx])%12;
}
function buildChordPcs(rootPc, quality){
  return (CHORD_INTERVALS[quality]||CHORD_INTERVALS['']).map(i=>(rootPc+i)%12);
}
function chordName(rootPc, quality){
  return spell(rootPc)+(CHORD_LABEL[quality]??quality);
}
function degLabel(d, q, mode){
  const isMin = q==='m'||q==='m7'||q==='m7b5'||q==='dim'||q==='dim7';
  const r = isMin||q==='m7b5'||q==='dim'||q==='dim7' ? DEG_ROMAN_MIN[d] : DEG_ROMAN[d];
  const suf = q==='dim'||q==='m7b5'?'°':q==='7b9'||q==='dim7'?'°':q==='maj7'?'△':'';
  return r+suf;
}

/* ============================================================ PIANO */
const WHITE=[{pc:0,n:'C'},{pc:2,n:'D'},{pc:4,n:'E'},{pc:5,n:'F'},{pc:7,n:'G'},{pc:9,n:'A'},{pc:11,n:'B'}];
const BLACK=[{pc:1,after:0,s:'C♯',f:'D♭'},{pc:3,after:1,s:'D♯',f:'E♭'},{pc:6,after:3,s:'F♯',f:'G♭'},{pc:8,after:4,s:'G♯',f:'A♭'},{pc:10,after:5,s:'A♯',f:'B♭'}];
function buildPiano(){
  const p=document.getElementById('piano'); p.innerHTML='';
  const W=47;
  WHITE.forEach(w=>{
    const k=document.createElement('button'); k.className='wkey'; k.dataset.pc=w.pc;
    k.innerHTML=`<span class="wlabel">${w.n}</span>`; p.appendChild(k);
  });
  BLACK.forEach(b=>{
    const k=document.createElement('button'); k.className='bkey'; k.dataset.pc=b.pc;
    const main=state.accPref==='#'?b.s:b.f, alt=state.accPref==='#'?b.f:b.s;
    k.innerHTML=`<span class="bname">${main}</span><span class="balt">${alt}</span>`;
    k.style.left=(8+(b.after+1)*W-15)+'px';
    p.appendChild(k);
  });
  p.addEventListener('click',e=>{
    const k=e.target.closest('[data-pc]'); if(!k) return;
    state.rootPc=+k.dataset.pc; render();
  });
}

/* ============================================================ GENRE TABS */
const GENRE_COLORS={
  'all':'var(--brass)','Jazz':'#45a3d9','Blues':'#e8503a','Rock':'#f08a3c',
  'Pop':'#8c7bd6','Métal':'#888','Punk':'#e06aa8','Ska':'#57c08a',

function buildGenreTabs(){
  const c=document.getElementById('genre-tabs'); c.innerHTML='';
  GENRES.forEach(g=>{
    const b=document.createElement('button');
    b.className='gtab'+(state.genre===g?' on':'');
    b.dataset.genre=g; b.textContent=g==='all'?'Tous':g;
    b.onclick=()=>{ state.genre=g; buildCadencesGrid(); syncUI(); };
    const col=GENRE_COLORS[g]||'var(--brass)';
    if(state.genre===g) b.style.cssText=`background:${col}22;border-color:${col};color:${col}`;
    c.appendChild(b);
  });
}

/* ============================================================ GRILLE */
function buildCadencesGrid(){
  const c=document.getElementById('cadences-grid'); c.innerHTML='';
  const filtered=CADENCES.filter(cad=>state.genre==='all'||cad.genre===state.genre);
  filtered.forEach(cad=>{
    const card=document.createElement('div');
    card.className='cadence-card'+(state.cadenceId===cad.id?' active':'');
    card.dataset.genre=cad.genre;
    // Degrés affichés
    const degs=cad.degrees.map((dg,i)=>{
      const col=CHORD_COLORS[i%CHORD_COLORS.length];
      return `<span class="cad-deg" style="color:${col};border-color:${col}44">${degLabel(dg.d,dg.q,cad.mode)}</span>`;
    }).join('');
    const col=GENRE_COLORS[cad.genre]||'var(--brass)';
    card.innerHTML=`
      <div class="cad-header">
        <div class="cad-label">${cad.label}</div>
        <div class="cad-genre" style="color:${col};border-color:${col}44">${cad.genre}</div>
      </div>
      <div class="cad-desc">${cad.desc}</div>
      <div class="cad-degrees">${degs}</div>`;
    card.onclick=()=>{ state.cadenceId=cad.id; state.chordIdx=0; render(); };
    c.appendChild(card);
  });
}

/* ============================================================ RÉSULTAT */
function renderResult(){
  const rz=document.getElementById('result-zone');
  if(!state.cadenceId){ rz.style.display='none'; return; }
  rz.style.display='';
  const cad=CADENCES.find(c=>c.id===state.cadenceId);
  if(!cad) return;

  // Calculer les accords
  const chords=cad.degrees.map((dg,i)=>{
    const pc=degPc(state.rootPc, dg.d, cad.mode);
    const pcs=buildChordPcs(pc, dg.q);
    const col=CHORD_COLORS[i%CHORD_COLORS.length];
    return {pc, pcs, quality:dg.q, name:chordName(pc,dg.q), col, deg:dg.d, roman:degLabel(dg.d,dg.q,cad.mode)};
  });

  const cur=chords[state.chordIdx];

  // Titre
  document.getElementById('result-title').innerHTML=
    `<span class="rtag">${cad.genre} — </span><b>${spell(state.rootPc)}</b> ${cad.label}`;

  // Vue globale : cartes d'accords
  const ov=document.getElementById('chords-overview'); ov.innerHTML='';
  chords.forEach((ch,i)=>{
    const pill=document.createElement('div');
    pill.className='chord-pill'+(i===state.chordIdx?' active':'');
    pill.style.borderColor=i===state.chordIdx?ch.col:'';
    pill.innerHTML=`
      <div class="cp-deg" style="color:${ch.col}">${ch.roman}</div>
      <div class="cp-name">${ch.name}</div>
      <div class="cp-notes">${ch.pcs.map(spell).join(' ')}</div>`;
    pill.onclick=()=>{ state.chordIdx=i; renderResult(); renderFretboard(chords); };
    ov.appendChild(pill);
  });

  // Navigation
  document.getElementById('btn-prev').disabled=state.chordIdx===0;
  document.getElementById('btn-next').disabled=state.chordIdx===chords.length-1;
  document.getElementById('chord-counter').textContent=`${state.chordIdx+1} / ${chords.length}`;

  // Info accord actif
  const info=document.getElementById('chord-info');
  const ivsStr=(CHORD_INTERVALS[cur.quality]||[0]).map(i=>{
    const names={0:'1',3:'♭3',4:'3',6:'♭5',7:'5',8:'♯5',9:'6',10:'♭7',11:'7',1:'♭9'};
    return names[i]||i;
  }).join(' – ');
  info.innerHTML=`
    <div>
      <div class="ci-name">${cur.name}</div>
      <div class="ci-formula" style="color:${cur.col}">${ivsStr}</div>
    </div>
    <div class="ci-notes">
      ${cur.pcs.map((pc,i)=>`<span class="ci-note" style="color:${CHORD_COLORS[i]||'var(--cream)'}">${spell(pc)}</span>`).join('')}
    </div>`;

  // Manche
  renderFretboard(chords);
}

function navigate(dir){
  const cad=CADENCES.find(c=>c.id===state.cadenceId); if(!cad) return;
  state.chordIdx=Math.max(0,Math.min(cad.degrees.length-1, state.chordIdx+dir));
  render();
}

/* ============================================================ MANCHE */
function renderFretboard(chords){
  const fb=document.getElementById('fretboard'); fb.innerHTML='';
  fb.classList.toggle('lefty', state.hand==='left');
  const frets=state.frets;
  fb.style.setProperty('--frets',frets);
  const strings=currentStrings();
  const cur=chords[state.chordIdx];
  // Carte pc → couleur (accord actif)
  const pcMap={};
  cur.pcs.forEach((pc,i)=>{ pcMap[pc]={col:CHORD_COLORS[i]||cur.col, isRoot:i===0, note:spell(pc), deg:(CHORD_INTERVALS[cur.quality]||[])[i]}; });

  let display=strings.slice().reverse(); // droitier = aigu en haut
  if(state.hand==='left') display=strings.slice();
  const thickness={E:3.4,A:2.7,D:2,G:1.3};

  const strDiv=document.createElement('div'); strDiv.className='fb-strings';
  display.forEach(s=>{
    const row=document.createElement('div'); row.className='fb-row';
    row.style.setProperty('--str-h',(thickness[s.n]||2)+'px');
    const lab=document.createElement('div'); lab.className='str-label'; lab.textContent=s.n;
    row.appendChild(lab);
    for(let f=0;f<=frets;f++){
      const cell=document.createElement('div');
      cell.className='cell'+(f===0?' open nut-after':'');
      const pc=(s.pc+f)%12;
      if(pcMap[pc]){
        const info=pcMap[pc];
        const d=document.createElement('div');
        d.className='dot'+(info.isRoot?' root':'');
        d.style.background=info.col;
        d.textContent=state.display==='note'?info.note:(info.deg!==undefined?({0:'1',3:'♭3',4:'3',6:'♭5',7:'5',8:'♯5',9:'6',10:'♭7',11:'7',1:'♭9'}[info.deg]||'?'):'?');
        d.title=`${s.n} case ${f} — ${info.note}`;
        cell.appendChild(d);
      }
      row.appendChild(cell);
    }
    strDiv.appendChild(row);
  });
  fb.appendChild(strDiv);

  // Inlays
  const inl=document.createElement('div'); inl.className='fb-inlays';
  inl.appendChild(Object.assign(document.createElement('div'),{className:'spacer'}));
  const SINGLE=[3,5,7,9,15,17,19,21],DOUBLE=[12,24];
  for(let f=0;f<=frets;f++){
    const ic=document.createElement('div'); ic.className='ic'+(f===0?' open':'');
    if(DOUBLE.includes(f)){const dbl=document.createElement('div');dbl.style.cssText='display:flex;gap:5px';dbl.innerHTML='<div class="inlay"></div><div class="inlay"></div>';ic.appendChild(dbl);}
    else if(SINGLE.includes(f)){ic.appendChild(Object.assign(document.createElement('div'),{className:'inlay'}));}
    else{const a=document.createElement('div');a.style.height='8px';ic.appendChild(a);}
    const num=document.createElement('div');num.className='fnum';num.textContent=f===0?'0':f;ic.appendChild(num);inl.appendChild(ic);
  }
  fb.appendChild(inl);

  // Légende
  const lg=document.getElementById('legend'); lg.innerHTML='';
  cur.pcs.forEach((pc,i)=>{
    const DEG_NAMES={0:'Fondamentale',3:'Tierce mineure',4:'Tierce Majeure',6:'Triton',7:'Quinte',8:'Quinte aug.',9:'Sixte',10:'7ème min.',11:'7ème Maj.',1:'9ème min.'};
    const iv=(CHORD_INTERVALS[cur.quality]||[])[i];
    const el=document.createElement('div'); el.className='legend-item';
    el.innerHTML=`<span class="leg-dot" style="background:${CHORD_COLORS[i]||cur.col}${i===0?';box-shadow:0 0 0 2px rgba(255,255,255,.7)':''}"></span>${spell(pc)}${i===0?' ← fondamentale':iv!==undefined?' – '+(DEG_NAMES[iv]||''):''}`;
    lg.appendChild(el);
  });
}

/* ============================================================ SYNCHRO UI */
function syncUI(){
  document.querySelectorAll('#piano .wkey').forEach(b=>b.classList.toggle('sel',+b.dataset.pc===state.rootPc));
  document.querySelectorAll('#piano .bkey').forEach(b=>b.classList.toggle('sel',+b.dataset.pc===state.rootPc));
  document.querySelectorAll('#accpref button').forEach(b=>b.classList.toggle('on',b.dataset.acc===state.accPref));
  document.querySelectorAll('#fb-hand button').forEach(b=>b.classList.toggle('on',b.dataset.hand===state.hand));
  document.querySelectorAll('#fb-frets-ctl button').forEach(b=>b.classList.toggle('on',+b.dataset.frets===state.frets));
  document.querySelectorAll('#fb-display button').forEach(b=>b.classList.toggle('on',b.dataset.disp===state.display));
  document.querySelectorAll('.cadence-card').forEach(c=>c.classList.toggle('active',c.querySelector('.cad-label')&&CADENCES.find(cd=>cd.id===state.cadenceId)?.label===c.querySelector('.cad-label').textContent));
  // Retirer le soulignement actif et remettre la couleur correcte
  document.querySelectorAll('.gtab').forEach(b=>{
    const g=b.dataset.genre, on=state.genre===g;
    b.classList.toggle('on',on);
    const col=GENRE_COLORS[g]||'var(--brass)';
    b.style.cssText=on?`background:${col}22;border-color:${col};color:${col}`:'';
  });
}

function render(){
  syncUI();
  buildCadencesGrid();
  renderResult();
}

/* ============================================================ INIT */
buildPiano();
buildGenreTabs();
buildCadencesGrid();

document.getElementById('accpref').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  state.accPref=b.dataset.acc; buildPiano(); render();
});
document.getElementById('fb-hand').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  state.hand=b.dataset.hand; render();
});
document.getElementById('fb-frets-ctl').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  state.frets=+b.dataset.frets; render();
});
document.getElementById('fb-display').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  state.display=b.dataset.disp; render();
});
render();
</script>
</body>
</html>
