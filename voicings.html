<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accords de basse — ScalaBass</title>
<meta name="description" content="Doigtés et accords pour basse : majeur, mineur, 7, maj7, m7, sus2, sus4, demi-diminué... Diagrammes de manche interactifs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<style>
  :root{
    --bg:#15100c; --bg-2:#1d160f; --panel:#241a12; --panel-2:#2c2016;
    --line:#3a2c1e; --wood-a:#5a3f26; --wood-b:#3a2415;
    --brass:#d9a849; --brass-dim:#9c7a3a; --bone:#efe6d3; --cream:#ece1cd;
    --muted:#9d8a72; --muted-2:#6f5f4c;
    --d1:#e8503a; --d2:#f08a3c; --d3:#f2c14e; --d4:#57c08a;
    --d5:#45a3d9; --d6:#8c7bd6; --d7:#e06aa8;
    --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,rgba(217,168,73,.10),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(217,168,73,.06),transparent 55%),var(--bg);color:var(--cream);font-family:"Hanken Grotesk",system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:clamp(20px,4vw,52px) clamp(16px,4vw,40px) 80px}
  header{margin-bottom:34px}
  /* ===== HEADER STABLE ===== */
  .eyebrow{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);display:flex;align-items:center;gap:12px;height:40px;flex-wrap:nowrap}
  .site-name{font-weight:700;letter-spacing:.18em;color:var(--brass);font-size:13px;white-space:nowrap;flex-shrink:0}
  .site-nav{display:flex;gap:2px;background:#0e0a07;border:1px solid var(--line);border-radius:8px;padding:3px;flex-shrink:0}
  .nav-link{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:5px;transition:color .12s,background .12s;white-space:nowrap;font-weight:700;display:inline-block}
  .nav-link:hover{color:var(--cream)}
  .nav-link.active{background:var(--brass);color:#160f08}
  .header-tools{display:flex;gap:10px;align-items:center;flex-wrap:nowrap;flex-shrink:0}
  .htool-seg{display:inline-flex;background:#0e0a07;border:1px solid var(--line);border-radius:7px;padding:2px;gap:1px;flex-shrink:0}
  .htool-seg button{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:0;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:5px;transition:color .1s,background .1s;white-space:nowrap;font-weight:700}
  .htool-seg button:hover{color:var(--cream)}
  .htool-seg button.on{background:var(--brass);color:#160f08}
  .htool-seg button[disabled]{opacity:.35;cursor:default;pointer-events:none}
  .htool-divider{width:1px;height:16px;background:var(--line);margin:0 2px;flex-shrink:0;align-self:center}
  /* H1 */
  h1{font-family:"Instrument Serif",serif;font-size:clamp(40px,6vw,72px);font-weight:400;line-height:1;margin:0 0 28px;color:var(--bone)}
  h1 em{color:var(--brass);font-style:italic}
  h2{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);margin:0 0 16px;font-weight:700}
  /* Segments */
  .seg{display:inline-flex;background:#0e0a07;border:1px solid var(--line);border-radius:7px;padding:2px;gap:1px}
  .seg button{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:0;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:5px;transition:.1s;white-space:nowrap;font-weight:700}
  .seg button.on{background:var(--brass);color:#160f08}
  .seg button:hover:not(.on){color:var(--cream)}
  /* Card */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:clamp(16px,3vw,28px);margin-bottom:20px}
  /* Piano */
  .piano-wrap{position:relative;height:72px;margin-bottom:20px;user-select:none}
  .wkey{position:absolute;width:44px;height:64px;border:1px solid var(--line);border-radius:0 0 5px 5px;background:#ece1cd;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;transition:.1s}
  .wkey:hover{background:#f5f0e8}
  .wkey.sel{background:var(--brass);color:#160f08}
  .wkey .wlabel{font-family:"Space Mono",monospace;font-size:9px;font-weight:700;color:#3a2415;pointer-events:none}
  .wkey.sel .wlabel{color:#160f08}
  .bkey{position:absolute;width:28px;height:42px;background:#1a1108;border:1px solid #000;border-radius:0 0 4px 4px;z-index:2;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;gap:1px;transition:.1s}
  .bkey:hover{background:#2a1f12}
  .bkey.sel{background:var(--brass)}
  .bkey .bname{font-family:"Space Mono",monospace;font-weight:700;font-size:9px;color:var(--cream);white-space:nowrap}
  .bkey.sel .bname{color:#160f08}
  .bkey .balt{font-size:8px;color:var(--muted-2);white-space:nowrap;line-height:1}
  .bkey.sel .balt{color:rgba(22,15,8,.6)}
  /* Sélecteur accords */
  .chord-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .chord-btn{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;background:#0e0a07;border:1px solid var(--line);color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;transition:.12s;white-space:nowrap}
  .chord-btn:hover{border-color:var(--brass-dim);color:var(--cream)}
  .chord-btn.on{background:var(--brass);border-color:var(--brass);color:#160f08}
  .chord-btn .cb-sym{font-size:9px;opacity:.7;margin-left:4px}
  /* Grille voicings */
  .voicings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
  /* Diagramme manche */
  .vd-card{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;cursor:pointer;transition:.12s;position:relative}
  .vd-card:hover{border-color:var(--brass-dim)}
  .vd-card.active{border-color:var(--brass);box-shadow:0 0 0 1px var(--brass)}
  .vd-label{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:8px;line-height:1.3}
  .vd-desc{font-size:11px;color:var(--muted);margin-bottom:10px;font-family:"Space Mono",monospace}
  .vd-diagram{position:relative;width:100%;height:80px}
  /* Diagramme SVG inline */
  .vd-svg{width:100%;height:80px}
  /* Info accord sélectionné */
  .voicing-detail{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:20px;display:none}
  .voicing-detail.visible{display:block}
  .vd-title{font-family:"Instrument Serif",serif;font-size:28px;color:var(--brass);margin-bottom:4px;font-weight:400}
  .vd-intervals{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .vd-int{background:rgba(217,168,73,.1);border:1px solid rgba(217,168,73,.2);border-radius:6px;padding:3px 10px;font-family:"Space Mono",monospace;font-size:10px;color:var(--brass)}
  /* Manche principal */
  .fb-main{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);padding:20px;overflow-x:auto}
  .fretboard-v{position:relative;height:120px;min-width:320px}
  .string-line{position:absolute;left:30px;right:0;height:2px;background:var(--muted-2)}
  .fret-line{position:absolute;top:0;bottom:0;width:2px;background:var(--line)}
  .nut{position:absolute;top:0;bottom:0;left:30px;width:4px;background:var(--bone)}
  .fb-dot{position:absolute;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Space Mono",monospace;font-size:9px;font-weight:700;transform:translate(-50%,-50%);z-index:3;transition:.12s}
  .fb-dot.root{box-shadow:0 0 0 3px rgba(255,255,255,.8),0 2px 6px rgba(0,0,0,.5)}
  .fb-fret-num{position:absolute;bottom:-18px;font-family:"Space Mono",monospace;font-size:8px;color:var(--muted-2);transform:translateX(-50%)}
  .finger-num{position:absolute;top:-16px;font-family:"Space Mono",monospace;font-size:9px;color:var(--brass);font-weight:700;transform:translateX(-50%)}
  .mute-x{position:absolute;font-family:"Space Mono",monospace;font-size:12px;color:var(--muted-2);transform:translate(-50%,-50%)}
  /* Notation notes */
  .note-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
  .note-badge{display:flex;flex-direction:column;align-items:center;gap:2px;background:#0e0a07;border:1px solid var(--line);border-radius:7px;padding:6px 10px;min-width:44px}
  .nb-note{font-family:"Instrument Serif",serif;font-size:18px;color:var(--cream)}
  .nb-role{font-family:"Space Mono",monospace;font-size:8px;color:var(--muted-2);letter-spacing:.1em}
  /* Play btn */
  .play-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:rgba(217,168,73,.12);border:1px solid var(--brass-dim);color:var(--brass);cursor:pointer;font-size:12px;transition:.12s;flex-shrink:0;font-family:"Space Mono",monospace;font-weight:700}
  .play-btn:hover{background:rgba(217,168,73,.25);transform:scale(1.08)}
  .play-btn.playing{background:var(--brass);color:#160f08}
  /* Filtre notes */
  .filter-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="eyebrow">
    <span class="site-name">ScalaBass</span>
    <nav class="site-nav">
      <a href="index.html"         class="nav-link">Gammes</a>
      <a href="arpeges-basse.html" class="nav-link">Arpèges</a>
      <a href="intervalles.html"   class="nav-link">Intervalles</a>
      <a href="manche.html"        class="nav-link">Manche</a>
      <a href="cadences.html"      class="nav-link">Cadences</a>
      <a href="analyse.html"       class="nav-link">Analyse</a>
      <a href="quintes.html"       class="nav-link">Quintes</a>
      <a href="voicings.html"      class="nav-link active">Accords</a>
    </nav>
    <div class="header-tools">
      <div class="htool-seg" id="notation-seg">
        <button data-notation="en" class="on" style="min-width:72px">A B C</button>
        <button data-notation="fr" style="min-width:72px">Do Ré Mi</button>
      </div>
      <div class="htool-divider"></div>
      <div class="htool-seg" id="lang-seg">
        <button data-lang="fr" class="on" style="min-width:34px">FR</button>
        <button data-lang="en" disabled style="min-width:34px;opacity:.35;cursor:default">EN</button>
        <button data-lang="es" disabled style="min-width:34px;opacity:.35;cursor:default">ES</button>
      </div>
    </div>
  </div>
  <h1>Ac<em>cords</em></h1>
  <p style="color:var(--muted);max-width:600px;margin:0">Doigtés d'accords pour basse — shapes mobiles, renversements et voicings jazz. Choisis une tonique et un type d'accord.</p>
</header>

<!-- Piano -->
<section class="card">
  <h2>Tonique</h2>
  <div class="piano-wrap" id="piano"></div>
</section>

<!-- Sélecteur accord + filtre -->
<section class="card">
  <h2>Type d'accord</h2>
  <div class="chord-grid" id="chord-grid"></div>
  <div class="filter-row">
    <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted-2);letter-spacing:.1em;text-transform:uppercase">Notes :</span>
    <div class="seg" id="notes-filter">
      <button data-notes="all" class="on">Tous</button>
      <button data-notes="2">2 notes</button>
      <button data-notes="3">3 notes</button>
      <button data-notes="4">4 notes</button>
    </div>
  </div>
</section>

<!-- Détail voicing actif -->
<div class="voicing-detail" id="voicing-detail">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
    <div class="vd-title" id="vd-title"></div>
    <div id="play-voicing-wrap"></div>
  </div>
  <div class="vd-intervals" id="vd-intervals"></div>
  <div class="fb-main" id="fb-main"></div>
  <div class="note-badges" id="note-badges"></div>
</div>

<!-- Grille de doigtés -->
<div class="voicings-grid" id="voicings-grid"></div>

<script>
/* ===== CONSTANTES ===== */
const NOTE_NAMES_EN    = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];
const NOTE_NAMES_EN_SH = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const NOTE_NAMES_FR    = ['Do','Ré♭','Ré','Mi♭','Mi','Fa','Sol♭','Sol','La♭','La','Si♭','Si'];
const PC_COLORS = ['#e8503a','#f08a3c','#f2c14e','#57c08a','#45a3d9','#8c7bd6','#e06aa8','#e8503a','#f08a3c','#f2c14e','#57c08a','#45a3d9'];

/* ===== ÉTAT ===== */
const state = {
  rootPc: 0,
  accPref: 'b',
  chordId: 'maj7',
  voicingIdx: 0,
  notesFilter: 'all',
  notation: localStorage.getItem('sbnot')||'en',
};

/* ===== NOTATION ===== */
function spell(pc) {
  if(state.notation==='fr') return NOTE_NAMES_FR[pc];
  return state.accPref==='#' ? NOTE_NAMES_EN_SH[pc] : NOTE_NAMES_EN[pc];
}

/* ===== PIANO ===== */
const W=44, B_W=28;
const WHITE=[{pc:0,n:'C'},{pc:2,n:'D'},{pc:4,n:'E'},{pc:5,n:'F'},{pc:7,n:'G'},{pc:9,n:'A'},{pc:11,n:'B'}];
const BLACK=[{pc:1,after:0},{pc:3,after:1},{pc:6,after:3},{pc:8,after:4},{pc:10,after:5}];
function buildPiano(){
  const p=document.getElementById('piano'); p.innerHTML='';
  p.style.position='relative';
  WHITE.forEach((w,i)=>{
    const k=document.createElement('button');
    k.className='wkey'+(state.rootPc===w.pc?' sel':'');
    k.dataset.pc=w.pc; k.style.left=(i*W)+'px';
    k.innerHTML=`<span class="wlabel">${spell(w.pc)}</span>`;
    k.onclick=()=>{state.rootPc=w.pc;state.accPref='b';render();};
    p.appendChild(k);
  });
  const EH={1:['C♯','D♭'],3:['D♯','E♭'],6:['F♯','G♭'],8:['G♯','A♭'],10:['A♯','B♭']};
  BLACK.forEach(b=>{
    const k=document.createElement('button');
    k.className='bkey'+(state.rootPc===b.pc?' sel':'');
    k.dataset.pc=b.pc;
    k.style.left=(8+(b.after+1)*W-B_W/2)+'px';
    const p2=EH[b.pc];
    const main=state.accPref==='#'?p2[0]:p2[1], alt=state.accPref==='#'?p2[1]:p2[0];
    k.innerHTML=`<span class="bname">${main}</span><span class="balt">${alt}</span>`;
    k.onclick=()=>{state.rootPc=b.pc;state.accPref=b.pc<=6?'b':'#';render();};
    p.appendChild(k);
  });
}

/* ===== VOICINGS DATA ===== */
const CHORD_TYPES = [
  {id:'maj',     label:'Majeur',        sym:'',     intervals:[0,4,7]},
  {id:'min',     label:'Mineur',        sym:'m',    intervals:[0,3,7]},
  {id:'dom7',    label:'Dominant 7',    sym:'7',    intervals:[0,4,7,10]},
  {id:'maj7',    label:'Majeur 7',      sym:'Δ7',   intervals:[0,4,7,11]},
  {id:'min7',    label:'Mineur 7',      sym:'m7',   intervals:[0,3,7,10]},
  {id:'minmaj7', label:'Mineur Maj7',   sym:'mΔ7',  intervals:[0,3,7,11]},
  {id:'halfdim', label:'Demi-dim.',     sym:'ø7',   intervals:[0,3,6,10]},
  {id:'dim7',    label:'Dim. 7',        sym:'°7',   intervals:[0,3,6,9]},
  {id:'sus4',    label:'Sus4',          sym:'sus4', intervals:[0,5,7]},
  {id:'sus2',    label:'Sus2',          sym:'sus2', intervals:[0,2,7]},
];

const INT_NAMES = {0:'R',1:'♭2',2:'2',3:'♭3',4:'3',5:'4',6:'♭5/♯4',7:'5',8:'♯5',9:'6',10:'♭7',11:'7'};

// Voicings : strings = index corde (0=E grave, 3=G aigu), frets = cases relatives à la fondamentale
// La fondamentale est toujours sur la corde la plus grave du voicing
const VOICINGS = {
  maj:[
    {label:'Shell : 1–5–10e',       n:3, str:[0,1,2], fr:[0,2,2],  fi:[1,3,4], desc:'Fondamentale sur E'},
    {label:'Shell : 1–5–10e',       n:3, str:[1,2,3], fr:[0,2,2],  fi:[1,3,4], desc:'Fondamentale sur A'},
    {label:'Double stop : 1–10e',   n:2, str:[2,3],   fr:[0,4],    fi:[1,4],   desc:'10ème (E–G)'},
    {label:'Double stop : 1–5',     n:2, str:[0,1],   fr:[0,2],    fi:[1,3],   desc:'Quinte à la main'},
    {label:'1er renversement',      n:3, str:[0,1,2], fr:[0,3,2],  fi:[1,4,3], desc:'3 à la basse'},
  ],
  min:[
    {label:'Shell : 1–5–♭10e',     n:3, str:[0,1,2], fr:[0,2,1],  fi:[1,3,2], desc:'Fondamentale sur E'},
    {label:'Shell : 1–5–♭10e',     n:3, str:[1,2,3], fr:[0,2,1],  fi:[1,3,2], desc:'Fondamentale sur A'},
    {label:'Double stop : 1–♭10e', n:2, str:[2,3],   fr:[0,3],    fi:[1,4],   desc:'10ème mineure (E–G)'},
    {label:'Double stop : 1–5',    n:2, str:[0,1],   fr:[0,2],    fi:[1,3],   desc:'Quinte'},
    {label:'1er renversement',     n:3, str:[0,1,2], fr:[0,2,2],  fi:[1,3,4], desc:'♭3 à la basse'},
  ],
  dom7:[
    {label:'Shell : 1–3–♭7',       n:3, str:[0,1,3], fr:[0,4,3],  fi:[1,3,4], desc:'Fond. sur E (Jazz)'},
    {label:'Shell : 1–3–♭7',       n:3, str:[1,2,3], fr:[0,4,3],  fi:[1,3,4], desc:'Fond. sur A (Jazz)'},
    {label:'4 notes serré',         n:4, str:[0,1,2,3],fr:[0,4,3,4],fi:[1,4,3,4],desc:'1–3–♭7–5'},
    {label:'Drop 2',                n:4, str:[0,1,2,3],fr:[0,2,1,2],fi:[1,3,2,4],desc:'5 à la basse'},
    {label:'1er renversement',      n:3, str:[0,1,3], fr:[0,3,2],  fi:[1,4,3], desc:'3 à la basse'},
  ],
  maj7:[
    {label:'Shell : 1–3–7',         n:3, str:[0,1,3], fr:[0,4,4],  fi:[1,3,4], desc:'Fond. sur E (Jazz)'},
    {label:'Shell : 1–3–7',         n:3, str:[1,2,3], fr:[0,4,4],  fi:[1,3,4], desc:'Fond. sur A (Jazz)'},
    {label:'4 notes',               n:4, str:[0,1,2,3],fr:[0,4,4,4],fi:[1,3,4,4],desc:'1–3–7–5'},
    {label:'Drop 2',                n:4, str:[0,1,2,3],fr:[0,2,2,2],fi:[1,2,3,3],desc:'5 à la basse'},
  ],
  min7:[
    {label:'Shell : 1–♭3–♭7',      n:3, str:[0,1,3], fr:[0,3,3],  fi:[1,3,4], desc:'Fond. sur E (Jazz)'},
    {label:'Shell : 1–♭3–♭7',      n:3, str:[1,2,3], fr:[0,3,3],  fi:[1,3,4], desc:'Fond. sur A (Jazz)'},
    {label:'4 notes serré',         n:4, str:[0,1,2,3],fr:[0,3,3,3],fi:[1,3,4,4],desc:'1–♭3–♭7–5'},
    {label:'Drop 2',                n:4, str:[0,1,2,3],fr:[0,2,1,2],fi:[1,3,2,4],desc:'5 à la basse'},
    {label:'Shape jazz ouvert',     n:3, str:[0,2,3], fr:[0,3,3],  fi:[1,3,4], desc:'1–♭7–♭3 (saut corde)'},
  ],
  minmaj7:[
    {label:'Shell : 1–♭3–7',        n:3, str:[0,1,3], fr:[0,3,4],  fi:[1,3,4], desc:'Fond. sur E'},
    {label:'4 notes',                n:4, str:[0,1,2,3],fr:[0,3,4,4],fi:[1,2,4,3],desc:'1–♭3–7–5'},
  ],
  halfdim:[
    {label:'Shell : 1–♭3–♭7',      n:3, str:[0,1,3], fr:[0,3,3],  fi:[1,3,4], desc:'Sans ♭5 (= m7)'},
    {label:'Avec ♭5',               n:3, str:[0,1,2], fr:[0,3,2],  fi:[1,4,2], desc:'1–♭3–♭5'},
    {label:'4 notes complet',       n:4, str:[0,1,2,3],fr:[0,3,2,3],fi:[1,4,2,3],desc:'1–♭3–♭5–♭7'},
  ],
  dim7:[
    {label:'4 notes sym.',          n:4, str:[0,1,2,3],fr:[0,3,2,3],fi:[1,4,2,3],desc:'1–♭3–♭5–𝄫7'},
    {label:'3 notes',               n:3, str:[0,1,2], fr:[0,3,2],  fi:[1,4,2], desc:'1–♭3–♭5'},
  ],
  sus4:[
    {label:'Fond. sur E',           n:3, str:[0,1,2], fr:[0,2,3],  fi:[1,3,4], desc:'1–5–4'},
    {label:'Fond. sur A',           n:3, str:[1,2,3], fr:[0,2,3],  fi:[1,3,4], desc:'1–5–4'},
  ],
  sus2:[
    {label:'Fond. sur E',           n:3, str:[0,1,3], fr:[0,2,2],  fi:[1,3,4], desc:'1–5–2'},
    {label:'Fond. sur A',           n:3, str:[1,2,3], fr:[0,2,0],  fi:[1,3,0], desc:'1–5–2'},
  ],
};

// Intervalles de chaque note selon le voicing
const CHORD_PCS = {
  maj:[0,4,7], min:[0,3,7], dom7:[0,4,7,10], maj7:[0,4,7,11],
  min7:[0,3,7,10], minmaj7:[0,3,7,11], halfdim:[0,3,6,10],
  dim7:[0,3,6,9], sus4:[0,5,7], sus2:[0,2,7],
};

// Nom de chaque intervalle dans l'accord
const INT_ROLE = {
  0:'R', 2:'2', 3:'♭3', 4:'3', 5:'4', 6:'♭5', 7:'5', 8:'♯5', 9:'6', 10:'♭7', 11:'7', 9:'𝄫7'
};

/* ===== AUDIO ===== */
let _sfInst=null,_audioCtx=null,_audioLoading=false;
const NOTE_MAP_AUDIO={'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'E#':5,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11,'B#':0,'Cb':11};
function noteToMidi(n,oct){const clean=n.replace('♯','#').replace('♭','b');const pc=NOTE_MAP_AUDIO[clean]??0;return(oct+1)*12+pc;}
async function initAudio(){
  if(_sfInst)return _sfInst;if(_audioLoading)return null;_audioLoading=true;
  try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    _sfInst=await Soundfont.instrument(_audioCtx,'electric_bass_finger',{soundfont:'MusyngKite',nameToUrl:(n,sf,fmt)=>`https://gleitz.github.io/midi-js-soundfonts/${sf}/${n}-${fmt}.js`,format:'mp3',gain:3.5});
    return _sfInst;
  }catch(e){console.warn(e);_audioLoading=false;return null;}
}
function makePlayBtn(onClick,title='Écouter'){
  const b=document.createElement('button');b.className='play-btn';b.innerHTML='▶';b.title=title;
  let pl=false;
  b.onclick=async(e)=>{e.stopPropagation();if(pl)return;pl=true;b.innerHTML='■';b.classList.add('playing');
    try{await onClick();}catch(err){console.warn(err);}
    setTimeout(()=>{pl=false;b.innerHTML='▶';b.classList.remove('playing');},3000);};
  return b;
}
async function playVoicing(voicing,rootPc){
  const inst=await initAudio();if(!inst)return;
  if(_audioCtx.state==='suspended')await _audioCtx.resume();
  const cpcs=CHORD_PCS[state.chordId]||[];
  // Calculer les pcs réels des notes jouées dans ce voicing
  voicing.str.forEach((si,i)=>{
    const openPcs=[4,9,2,7]; // E A D G
    const notePc=(openPcs[si]+voicing.fr[i])%12;
    const noteName=NOTE_NAMES_EN[notePc];
    // Octave : corde E=1, A=1, D=2, G=2 (environ)
    const baseOct=[1,1,2,2];
    const midi=noteToMidi(noteName,baseOct[si]);
    inst.play(midi,_audioCtx.currentTime+i*0.08,{duration:1.8,gain:3});
  });
}

/* ===== RENDER ===== */
function buildChordButtons(){
  const c=document.getElementById('chord-grid'); c.innerHTML='';
  CHORD_TYPES.forEach(ct=>{
    const b=document.createElement('button');
    b.className='chord-btn'+(ct.id===state.chordId?' on':'');
    b.innerHTML=`${ct.label}<span class="cb-sym">${ct.sym}</span>`;
    b.onclick=()=>{state.chordId=ct.id;state.voicingIdx=0;render();};
    c.appendChild(b);
  });
}

function buildVoicingsGrid(){
  const grid=document.getElementById('voicings-grid'); grid.innerHTML='';
  const vlist=(VOICINGS[state.chordId]||[]).filter(v=>state.notesFilter==='all'||v.n===+state.notesFilter);
  vlist.forEach((v,i)=>{
    const card=document.createElement('div');
    card.className='vd-card'+(i===state.voicingIdx?' active':'');
    card.innerHTML=`<div class="vd-label">${v.label}</div><div class="vd-desc">${v.desc}</div>`;
    // Mini diagramme SVG
    card.appendChild(makeMiniDiagram(v));
    card.onclick=()=>{state.voicingIdx=i;renderDetail(v);document.querySelectorAll('.vd-card').forEach((c,j)=>c.classList.toggle('active',j===i));};
    grid.appendChild(card);
  });
  // Afficher le détail du premier
  if(vlist.length>0) renderDetail(vlist[state.voicingIdx]||vlist[0]);
}

function makeMiniDiagram(v){
  const SVG_W=160,SVG_H=70;
  const STRINGS=4, FRETS=5;
  const stX=20, stW=SVG_W-40, fH=SVG_H-20, stY=10;
  const sx=i=>stX+i*(stW/STRINGS);
  const fy=f=>stY+f*(fH/FRETS);

  const openPcs=[4,9,2,7]; // E A D G
  // Trouver la case de départ (fondamentale sur la corde la plus grave)
  const rootStr=v.str[0];
  const rootFret=v.fr[0];
  // Case sur le manche (absolue depuis fondamentale = rootPc)
  const startFret=((state.rootPc-openPcs[rootStr])+24)%12;

  let svg=`<svg class="vd-svg" viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg">`;
  // Cordes (verticales)
  for(let s=0;s<4;s++) svg+=`<line x1="${sx(s)}" y1="${stY}" x2="${sx(s)}" y2="${stY+fH}" stroke="#6f5f4c" stroke-width="${1+s*0.3}"/>`;
  // Barrettes (horizontales)
  for(let f=0;f<=FRETS;f++) svg+=`<line x1="${stX}" y1="${fy(f)}" x2="${stX+stW}" y2="${fy(f)}" stroke="#3a2c1e" stroke-width="1"/>`;
  // Numéro de case
  svg+=`<text x="${stX-4}" y="${fy(1)+4}" fill="#6f5f4c" font-size="8" font-family="monospace" text-anchor="end">${startFret||'0'}</text>`;
  // Points
  const cpcs=CHORD_PCS[state.chordId]||[];
  v.str.forEach((si,i)=>{
    const relFret=v.fr[i];
    const notePc=(openPcs[si]+startFret+relFret)%12;
    const semis=(notePc-state.rootPc+12)%12;
    const isRoot=semis===0;
    const col=isRoot?'#e8503a':'#d9a849';
    const cx=sx(si), cy=fy(relFret)+fy(1)/2;
    if(relFret===0){
      svg+=`<circle cx="${cx}" cy="${stY-6}" r="5" fill="none" stroke="${col}" stroke-width="1.5"/>`;
    } else {
      svg+=`<circle cx="${cx}" cy="${cy}" r="9" fill="${col}" opacity="${isRoot?1:.85}"/>`;
      // Doigté
      if(v.fi[i]>0) svg+=`<text x="${cx}" y="${cy+4}" fill="#160f08" font-size="8" font-family="monospace" text-anchor="middle" font-weight="bold">${v.fi[i]}</text>`;
    }
  });
  svg+='</svg>';
  const div=document.createElement('div');
  div.innerHTML=svg;
  return div.firstChild;
}

function renderDetail(v){
  const det=document.getElementById('voicing-detail');
  det.classList.add('visible');
  const ct=CHORD_TYPES.find(c=>c.id===state.chordId);
  const rootName=spell(state.rootPc);
  document.getElementById('vd-title').textContent=`${rootName}${ct?.sym||''} — ${v.label}`;
  // Intervalles
  const ivsEl=document.getElementById('vd-intervals');
  const openPcs=[4,9,2,7];
  const startFret=((state.rootPc-openPcs[v.str[0]])+24)%12;
  ivsEl.innerHTML='';
  v.str.forEach((si,i)=>{
    const notePc=(openPcs[si]+startFret+v.fr[i])%12;
    const semis=(notePc-state.rootPc+12)%12;
    const div=document.createElement('div');
    div.className='vd-int';
    div.textContent=`${spell(notePc)} (${INT_NAMES[semis]||semis})`;
    ivsEl.appendChild(div);
  });
  // Manche principal
  renderMainFretboard(v,startFret);
  // Bouton play
  const pw=document.getElementById('play-voicing-wrap'); pw.innerHTML='';
  const btn=makePlayBtn(()=>playVoicing(v,state.rootPc),'Jouer le voicing');
  pw.appendChild(btn);
}

function renderMainFretboard(v,startFret){
  const FRET_W=60, STR_GAP=24, MARGIN_L=40, MARGIN_T=20;
  const NFRETS=5, NSTR=4;
  const W=MARGIN_L+NFRETS*FRET_W+20, H=MARGIN_T+(NSTR-1)*STR_GAP+MARGIN_T;
  const openPcs=[4,9,2,7];

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:360px">`;
  // Nut ou numéro de case
  if(startFret<=1){
    svg+=`<rect x="${MARGIN_L}" y="${MARGIN_T-8}" width="6" height="${(NSTR-1)*STR_GAP+16}" rx="2" fill="#ece1cd"/>`;
  } else {
    svg+=`<text x="${MARGIN_L-8}" y="${MARGIN_T+4}" fill="#6f5f4c" font-size="10" font-family="monospace" text-anchor="end">${startFret}</text>`;
  }
  // Barrettes
  for(let f=0;f<=NFRETS;f++){
    const x=MARGIN_L+f*FRET_W;
    svg+=`<line x1="${x}" y1="${MARGIN_T-8}" x2="${x}" y2="${MARGIN_T+(NSTR-1)*STR_GAP+8}" stroke="#3a2c1e" stroke-width="${f===0?3:1}"/>`;
  }
  // Cordes
  for(let s=0;s<NSTR;s++){
    const y=MARGIN_T+s*STR_GAP;
    const stW=1+(NSTR-s-1)*0.5;
    svg+=`<line x1="${MARGIN_L}" y1="${y}" x2="${MARGIN_L+NFRETS*FRET_W}" y2="${y}" stroke="#9d8a72" stroke-width="${stW}"/>`;
    // Nom corde
    const cn=['E','A','D','G'];
    svg+=`<text x="${MARGIN_L-12}" y="${y+4}" fill="#6f5f4c" font-size="9" font-family="monospace" text-anchor="middle">${cn[s]}</text>`;
  }
  // Numéros de cases
  for(let f=1;f<=NFRETS;f++){
    const x=MARGIN_L+(f-0.5)*FRET_W;
    svg+=`<text x="${x}" y="${H-4}" fill="#3a2c1e" font-size="9" font-family="monospace" text-anchor="middle">${startFret+f-1}</text>`;
  }
  // Dots
  v.str.forEach((si,i)=>{
    const relFret=v.fr[i];
    const notePc=(openPcs[si]+startFret+relFret)%12;
    const semis=(notePc-state.rootPc+12)%12;
    const isRoot=semis===0;
    const cy=MARGIN_T+si*STR_GAP;
    const DEG_COLORS=['#e8503a','#f08a3c','#f2c14e','#57c08a','#45a3d9','#8c7bd6','#e06aa8','#e8503a','#f08a3c','#f2c14e','#57c08a','#45a3d9'];
    const col=DEG_COLORS[semis]||'#d9a849';
    if(relFret===0){
      // Note à vide / fondamentale sur corde ouverte
      const cx=MARGIN_L-22;
      svg+=`<circle cx="${cx}" cy="${cy}" r="10" fill="${col}" opacity="0.9"/>`;
      svg+=`<text x="${cx}" y="${cy+4}" fill="#160f08" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">${INT_NAMES[semis]}</text>`;
    } else {
      const cx=MARGIN_L+(relFret-0.5)*FRET_W;
      svg+=`<circle cx="${cx}" cy="${cy}" r="13" fill="${col}"/>`;
      if(isRoot) svg+=`<circle cx="${cx}" cy="${cy}" r="16" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2"/>`;
      // Intervalle
      svg+=`<text x="${cx}" y="${cy+4}" fill="${isRoot?'#160f08':'#160f08'}" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">${INT_NAMES[semis]}</text>`;
      // Doigté au-dessus
      if(v.fi[i]>0) svg+=`<text x="${cx}" y="${cy-17}" fill="#d9a849" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">${v.fi[i]}</text>`;
    }
  });
  // Note de description
  svg+=`<text x="${MARGIN_L}" y="${H+2}" fill="#9d8a72" font-size="9" font-family="'Hanken Grotesk',sans-serif">${v.desc}</text>`;
  svg+='</svg>';
  document.getElementById('fb-main').innerHTML=svg;
}

/* ===== INIT ===== */
function render(){
  buildPiano();
  buildChordButtons();
  buildVoicingsGrid();
}

// Filtre notes
document.getElementById('notes-filter').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  state.notesFilter=b.dataset.notes;
  document.querySelectorAll('#notes-filter button').forEach(x=>x.classList.toggle('on',x===b));
  state.voicingIdx=0;
  buildVoicingsGrid();
});

// Notation
document.getElementById('notation-seg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b||!b.dataset.notation) return;
  state.notation=b.dataset.notation;
  localStorage.setItem('sbnot',state.notation);
  document.querySelectorAll('#notation-seg button').forEach(x=>x.classList.toggle('on',x.dataset.notation===state.notation));
  render();
});

render();
</script>
