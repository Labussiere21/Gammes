<script>
/* ===== CONSTANTES ===== */
const NOTE_EN_FLAT  = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];
const NOTE_EN_SHARP = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const NOTE_FR       = ['Do','Ré♭','Ré','Mi♭','Mi','Fa','Sol♭','Sol','La♭','La','Si♭','Si'];
const OPEN_PCS = [4, 9, 2, 7]; // E A D G
const STRING_NAMES = ['E','A','D','G'];
const DEG_COLORS = ['#e8503a','#f08a3c','#f2c14e','#57c08a','#45a3d9','#8c7bd6','#e06aa8'];
const INT_LABEL = {0:'R',2:'2',3:'♭3',4:'3',5:'4',6:'♭5',7:'5',8:'♯5',9:'6',10:'♭7',11:'7'};
const INT_COLOR = {0:'#e8503a',3:'#f08a3c',4:'#f08a3c',5:'#f2c14e',6:'#57c08a',7:'#45a3d9',9:'#8c7bd6',10:'#8c7bd6',11:'#e06aa8',2:'#57c08a',8:'#e06aa8'};

/* ===== ÉTAT ===== */
const state = {
  rootPc: 0,
  accPref: 'b',
  chordId: 'maj',
  diagIdx: 0,
  notation: localStorage.getItem('sbnot')||'en',
};

function spell(pc) {
  if(state.notation==='fr') return NOTE_FR[pc];
  return state.accPref==='#' ? NOTE_EN_SHARP[pc] : NOTE_EN_FLAT[pc];
}

/* ===== TYPES D'ACCORDS ===== */
// intervals = demi-tons depuis la fondamentale
const CHORD_TYPES = [
  {id:'maj',      label:'Majeur',      sym:'',     iv:[0,4,7]},
  {id:'min',      label:'Mineur',      sym:'m',    iv:[0,3,7]},
  {id:'dom7',     label:'Dominant 7',  sym:'7',    iv:[0,4,7,10]},
  {id:'maj7',     label:'Majeur 7',    sym:'△7',   iv:[0,4,7,11]},
  {id:'min7',     label:'Mineur 7',    sym:'m7',   iv:[0,3,7,10]},
  {id:'minmaj7',  label:'Mineur △7',  sym:'m△7',  iv:[0,3,7,11]},
  {id:'dom7sus4', label:'7sus4',       sym:'7sus4',iv:[0,5,7,10]},
  {id:'halfdim',  label:'Demi-dim.',   sym:'ø7',   iv:[0,3,6,10]},
  {id:'dim7',     label:'Dim. 7',      sym:'°7',   iv:[0,3,6,9]},
  {id:'aug',      label:'Augmenté',    sym:'+',    iv:[0,4,8]},
  {id:'sus2',     label:'Sus2',        sym:'sus2', iv:[0,2,7]},
  {id:'sus4',     label:'Sus4',        sym:'sus4', iv:[0,5,7]},
];

/* ===== CALCUL DES DOIGTÉS =====
   Pour chaque type d'accord, on cherche automatiquement
   toutes les positions jouables sur 3-4 cordes adjacentes
   dans une fenêtre de 4 cases (main humaine).
*/
function computeShapes(rootPc, intervals) {
  const shapes = [];
  const N = intervals.length;

  // Essayer toutes les cordes de départ pour la note la plus grave
  for(let rootStr = 0; rootStr <= 4 - N; rootStr++) {
    // Case de la fondamentale sur cette corde
    const rootFret = (rootPc - OPEN_PCS[rootStr] + 24) % 12;

    // Pour chaque octave possible (évite les positions trop hautes)
    for(let oct = 0; oct <= 1; oct++) {
      const baseFret = rootFret + oct * 12;
      if(baseFret > 15) continue; // pas trop haut

      // Placer les autres notes sur les cordes suivantes
      let valid = true;
      const frets = [baseFret];
      const strings = [rootStr];
      const notePcs = [rootPc];

      for(let i = 1; i < N; i++) {
        const notePc = (rootPc + intervals[i]) % 12;
        const str = rootStr + i;
        if(str > 3) { valid = false; break; }

        // Case la plus proche au-dessus de la note précédente - 2 cases
        let fret = (notePc - OPEN_PCS[str] + 24) % 12;
        // Ajuster pour rester dans la fenêtre
        while(fret < baseFret - 2) fret += 12;
        while(fret > baseFret + 5) fret -= 12;
        if(fret < 0 || fret > baseFret + 6) { valid = false; break; }

        frets.push(fret);
        strings.push(str);
        notePcs.push(notePc);
      }

      if(!valid) continue;

      // Vérifier que l'écart est jouable
      // 4 notes : on tolère jusqu'à 6 cases (position de barre ou étirement)
      const nonZero = frets.filter(f => f > 0);
      if(nonZero.length > 0) {
        const span = Math.max(...nonZero) - Math.min(...nonZero);
        const maxSpan = N >= 4 ? 6 : 5;
        if(span > maxSpan) continue;
      }

      // Calculer les doigtés (1=index, 2=majeur, 3=annulaire, 4=auriculaire)
      const minFret = Math.min(...frets.filter(f => f > 0));
      const fingers = frets.map(f => {
        if(f === 0) return 0; // corde à vide
        return Math.min(4, f - minFret + 1);
      });

      // Label de position
      const lowestFret = Math.min(...frets);
      const label = lowestFret === 0 ? 'Position ouverte' :
                    lowestFret <= 5  ? `Position ${lowestFret} (case ${lowestFret})` :
                                       `Case ${lowestFret}`;

      shapes.push({ strings, frets, fingers, notePcs, label, minFret });
    }
  }

  // Dédupliquer (même shape = mêmes cases sur mêmes cordes)
  const seen = new Set();
  return shapes.filter(s => {
    const key = s.strings.join(',') + ':' + s.frets.join(',');
    if(seen.has(key)) return false;
    seen.add(key); return true;
  }).sort((a, b) => Math.min(...a.frets) - Math.min(...b.frets));
}

/* ===== DIAGRAMME SVG ===== */
function makeDiagram(shape, rootPc, intervals, size='small') {
  const isLarge = size === 'large';
  const FRETS_SHOWN = 5;
  const STR_GAP = isLarge ? 36 : 22;
  const FRET_W  = isLarge ? 52 : 30;
  const DOT_R   = isLarge ? 13 : 8;
  const FONT_SZ = isLarge ? 10 : 7;
  const FINGER_SZ = isLarge ? 12 : 0; // doigtés visibles seulement en grand
  const MARGIN_T = isLarge ? 28 : 20;
  const MARGIN_L = isLarge ? 36 : 22;
  const N_STR = shape.strings.length;

  // Cases affichées : de minFret-1 à minFret+FRETS_SHOWN
  const nonZeroFrets = shape.frets.filter(f => f > 0);
  const startFret = nonZeroFrets.length > 0 ? Math.max(1, Math.min(...nonZeroFrets)) : 1;
  const endFret = startFret + FRETS_SHOWN - 1;

  const W = MARGIN_L + FRETS_SHOWN * FRET_W + (isLarge ? 20 : 10);
  const H = MARGIN_T + (N_STR - 1) * STR_GAP + (isLarge ? 30 : 16);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${isLarge?380:180}px">`;

  // Nut (si case 1) ou numéro de case
  if(startFret <= 1) {
    svg += `<rect x="${MARGIN_L}" y="${MARGIN_T-10}" width="5" height="${(N_STR-1)*STR_GAP+20}" rx="2" fill="#ece1cd"/>`;
  } else {
    svg += `<text x="${MARGIN_L - 6}" y="${MARGIN_T + 4}" fill="#6f5f4c" font-size="${isLarge?11:8}" font-family="monospace" text-anchor="end" font-weight="bold">${startFret}</text>`;
  }

  // Barrettes
  for(let f = 0; f <= FRETS_SHOWN; f++) {
    const x = MARGIN_L + f * FRET_W;
    svg += `<line x1="${x}" y1="${MARGIN_T-10}" x2="${x}" y2="${MARGIN_T+(N_STR-1)*STR_GAP+10}" stroke="#3a2c1e" stroke-width="${f===0?3:1}"/>`;
  }

  // Cordes + noms
  shape.strings.forEach((si, i) => {
    const y = MARGIN_T + i * STR_GAP;
    const thickness = 1 + (3 - si) * 0.4;
    svg += `<line x1="${MARGIN_L}" y1="${y}" x2="${MARGIN_L + FRETS_SHOWN * FRET_W}" y2="${y}" stroke="#9d8a72" stroke-width="${thickness}"/>`;
    if(isLarge) {
      svg += `<text x="${MARGIN_L - 8}" y="${y + 4}" fill="#6f5f4c" font-size="10" font-family="monospace" text-anchor="end">${STRING_NAMES[si]}</text>`;
    }
  });

  // Numéros de cases (en bas, grand mode)
  if(isLarge) {
    for(let f = 1; f <= FRETS_SHOWN; f++) {
      const x = MARGIN_L + (f - 0.5) * FRET_W;
      svg += `<text x="${x}" y="${H - 4}" fill="#3a2c1e" font-size="9" font-family="monospace" text-anchor="middle">${startFret + f - 1}</text>`;
    }
  }

  // Dots
  shape.strings.forEach((si, i) => {
    const fret = shape.frets[i];
    const y = MARGIN_T + i * STR_GAP;
    const notePc = shape.notePcs[i];
    const semi = (notePc - rootPc + 12) % 12;
    const col = INT_COLOR[semi] || '#d9a849';
    const isRoot = semi === 0;
    const label = INT_LABEL[semi] || '?';

    if(fret === 0) {
      // Corde à vide : cercle ouvert à gauche du nut
      const cx = MARGIN_L - (isLarge ? 20 : 12);
      svg += `<circle cx="${cx}" cy="${y}" r="${DOT_R}" fill="none" stroke="${col}" stroke-width="2"/>`;
      if(isLarge) svg += `<text x="${cx}" y="${y+4}" fill="${col}" font-size="${FONT_SZ}" font-family="monospace" text-anchor="middle">${label}</text>`;
    } else {
      // Note sur le manche
      const relFret = fret - startFret + 1; // position dans la fenêtre
      const cx = MARGIN_L + (relFret - 0.5) * FRET_W;
      svg += `<circle cx="${cx}" cy="${y}" r="${DOT_R}" fill="${col}"/>`;
      if(isRoot) svg += `<circle cx="${cx}" cy="${y}" r="${DOT_R+3}" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/>`;
      svg += `<text x="${cx}" y="${y+FONT_SZ/2+1}" fill="#160f08" font-size="${FONT_SZ}" font-family="monospace" text-anchor="middle" font-weight="bold">${label}</text>`;
      // Doigté au-dessus (grand mode)
      if(isLarge && shape.fingers[i] > 0) {
        svg += `<text x="${cx}" y="${y - DOT_R - 5}" fill="#d9a849" font-size="${FINGER_SZ}" font-family="monospace" text-anchor="middle" font-weight="bold">${shape.fingers[i]}</text>`;
      }
    }
  });

  svg += '</svg>';
  return svg;
}

/* ===== AUDIO ===== */
let _sfInst=null,_audioCtx=null,_audioLoading=false;
const NOTE_MAP={'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
function noteToMidi(pc,str){
  // Octave selon la corde : E=1, A=1, D=2, G=2
  const baseOct=[1,1,2,2];
  return (baseOct[str]+1)*12+pc;
}
async function initAudio(){
  if(_sfInst)return _sfInst;if(_audioLoading)return null;_audioLoading=true;
  try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    _sfInst=await Soundfont.instrument(_audioCtx,'electric_bass_finger',{soundfont:'MusyngKite',
      nameToUrl:(n,sf,fmt)=>`https://gleitz.github.io/midi-js-soundfonts/${sf}/${n}-${fmt}.js`,format:'mp3',gain:3.5});
    return _sfInst;
  }catch(e){console.warn(e);_audioLoading=false;return null;}
}

/* ===== PIANO ===== */
const W=44;
const WHITES=[{pc:0},{pc:2},{pc:4},{pc:5},{pc:7},{pc:9},{pc:11}];
const BLACKS=[{pc:1,after:0},{pc:3,after:1},{pc:6,after:3},{pc:8,after:4},{pc:10,after:5}];
const EH={1:['C♯','D♭'],3:['D♯','E♭'],6:['F♯','G♭'],8:['G♯','A♭'],10:['A♯','B♭']};

function buildPiano(){
  const p=document.getElementById('piano'); p.innerHTML='';
  WHITES.forEach((w,i)=>{
    const k=document.createElement('button');
    k.className='wkey'+(state.rootPc===w.pc?' sel':'');
    k.style.left=(i*W)+'px';
    k.innerHTML=`<span class="wlabel">${spell(w.pc)}</span>`;
    k.onclick=()=>{state.rootPc=w.pc;state.accPref='b';render();};
    p.appendChild(k);
  });
  BLACKS.forEach(b=>{
    const k=document.createElement('button');
    k.className='bkey'+(state.rootPc===b.pc?' sel':'');
    k.style.left=(8+(b.after+1)*W-14)+'px';
    const pair=EH[b.pc];
    const main=state.accPref==='#'?pair[0]:pair[1];
    const alt=state.accPref==='#'?pair[1]:pair[0];
    k.innerHTML=`<span class="bname">${main}</span><span class="balt">${alt}</span>`;
    k.onclick=()=>{state.rootPc=b.pc;state.accPref=b.pc<=6?'b':'#';render();};
    p.appendChild(k);
  });
}

/* ===== RENDER ===== */
function render(){
  buildPiano();

  // Boutons type d'accord
  const g=document.getElementById('chord-type-grid'); g.innerHTML='';
  CHORD_TYPES.forEach(ct=>{
    const b=document.createElement('button');
    b.className='ctype-btn'+(ct.id===state.chordId?' on':'');
    b.innerHTML=`${ct.label}<span class="ctype-sym">${ct.sym}</span>`;
    b.onclick=()=>{state.chordId=ct.id;state.diagIdx=0;render();};
    g.appendChild(b);
  });

  // Calculer les shapes
  const ct=CHORD_TYPES.find(c=>c.id===state.chordId);
  const shapes=computeShapes(state.rootPc, ct.iv);

  // Grille de mini-diagrammes
  const grid=document.getElementById('diagrams-grid'); grid.innerHTML='';
  if(shapes.length===0){
    grid.innerHTML='<p style="color:var(--muted);font-size:13px">Aucun doigté trouvé.</p>';
    return;
  }
  shapes.forEach((sh,i)=>{
    const card=document.createElement('div');
    card.className='diag-card'+(i===state.diagIdx?' active':'');
    card.innerHTML=`<div class="diag-title">${sh.label}</div>${makeDiagram(sh,state.rootPc,ct.iv,'small')}`;
    card.onclick=()=>{
      state.diagIdx=i;
      document.querySelectorAll('.diag-card').forEach((c,j)=>c.classList.toggle('active',j===i));
      showDetail(shapes[i],ct);
    };
    grid.appendChild(card);
  });

  showDetail(shapes[state.diagIdx]||shapes[0], ct);
}

function showDetail(shape, ct){
  const det=document.getElementById('detail-wrap');
  det.classList.add('visible');

  const rootName=spell(state.rootPc);
  document.getElementById('detail-name').textContent=`${rootName}${ct.sym}`;
  document.getElementById('detail-desc').textContent=shape.label;
  document.getElementById('detail-svg').innerHTML=makeDiagram(shape,state.rootPc,ct.iv,'large');

  // Notes de l'accord
  const nr=document.getElementById('detail-notes'); nr.innerHTML='';
  shape.strings.forEach((si,i)=>{
    const notePc=shape.notePcs[i];
    const semi=(notePc-state.rootPc+12)%12;
    const chip=document.createElement('div');
    chip.className='note-chip';
    chip.innerHTML=`<span class="nc-note">${spell(notePc)}</span><span class="nc-role">${INT_LABEL[semi]||'?'} — corde ${STRING_NAMES[si]} case ${shape.frets[i]||'à vide'}</span>`;
    nr.appendChild(chip);
  });

  // Bouton play
  const pw=document.getElementById('detail-play-wrap'); pw.innerHTML='';
  const btn=document.createElement('button');
  btn.className='play-btn'; btn.innerHTML='▶'; btn.title='Jouer l\'accord';
  let pl=false;
  btn.onclick=async()=>{
    if(pl)return; pl=true; btn.innerHTML='■'; btn.classList.add('playing');
    const inst=await initAudio();
    if(inst&&_audioCtx){
      if(_audioCtx.state==='suspended')await _audioCtx.resume();
      shape.strings.forEach((si,i)=>{
        const midi=noteToMidi(shape.notePcs[i],si);
        inst.play(midi,_audioCtx.currentTime+i*0.08,{duration:1.8,gain:3.5});
      });
    }
    setTimeout(()=>{pl=false;btn.innerHTML='▶';btn.classList.remove('playing');},2500);
  };
  pw.appendChild(btn);
}

// Notation
document.getElementById('notation-seg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||!b.dataset.notation)return;
  state.notation=b.dataset.notation;
  localStorage.setItem('sbnot',state.notation);
  document.querySelectorAll('#notation-seg button').forEach(x=>x.classList.toggle('on',x.dataset.notation===state.notation));
  render();
});

render();
</script>
